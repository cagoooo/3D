<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- 宇宙深色背景漸層 -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="50%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <!-- 光暈中心漸層 -->
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#4f46e5" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <!-- 底部倒影漸層 -->
    <linearGradient id="floorRef" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <!-- 卡片1漸層 -->
    <linearGradient id="card1Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1f6e"/>
      <stop offset="100%" stop-color="#0f0a2a"/>
    </linearGradient>
    <!-- 卡片發光邊框 -->
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 文字光暈濾鏡 -->
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 星塵模糊 -->
    <filter id="starBlur">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <!-- 頂部光束漸層 -->
    <linearGradient id="beamGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <!-- 玻璃卡片效果 -->
    <linearGradient id="glassGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <!-- 紫色主光暈 -->
    <radialGradient id="purpleAura" cx="50%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ========== 背景層 ========== -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- 紫色主光暈 -->
  <ellipse cx="600" cy="340" rx="480" ry="320" fill="url(#purpleAura)"/>
  <!-- 中央聚光 -->
  <ellipse cx="600" cy="315" rx="300" ry="280" fill="url(#glowCenter)"/>

  <!-- ========== 星空粒子 ========== -->
  <g filter="url(#starBlur)" opacity="0.9">
    <!-- 大星點 -->
    <circle cx="62" cy="45" r="1.8" fill="white" opacity="0.9"/>
    <circle cx="145" cy="112" r="1.2" fill="white" opacity="0.7"/>
    <circle cx="287" cy="38" r="2.0" fill="white" opacity="0.8"/>
    <circle cx="390" cy="71" r="1.0" fill="white" opacity="0.6"/>
    <circle cx="523" cy="22" r="1.5" fill="#c4b5fd" opacity="0.85"/>
    <circle cx="668" cy="55" r="1.8" fill="white" opacity="0.75"/>
    <circle cx="812" cy="29" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="934" cy="63" r="1.6" fill="#a5b4fc" opacity="0.7"/>
    <circle cx="1058" cy="41" r="1.9" fill="white" opacity="0.9"/>
    <circle cx="1143" cy="88" r="1.1" fill="white" opacity="0.6"/>
    <!-- 中等星點 -->
    <circle cx="98" cy="188" r="1.3" fill="white" opacity="0.55"/>
    <circle cx="213" cy="155" r="0.9" fill="#ddd6fe" opacity="0.8"/>
    <circle cx="341" cy="201" r="1.5" fill="white" opacity="0.65"/>
    <circle cx="467" cy="139" r="1.1" fill="white" opacity="0.7"/>
    <circle cx="738" cy="121" r="1.4" fill="#c7d2fe" opacity="0.75"/>
    <circle cx="867" cy="168" r="0.8" fill="white" opacity="0.6"/>
    <circle cx="1001" cy="145" r="1.6" fill="white" opacity="0.7"/>
    <circle cx="1112" cy="198" r="1.0" fill="#e0e7ff" opacity="0.65"/>
    <!-- 底部星點 -->
    <circle cx="74" cy="490" r="1.2" fill="white" opacity="0.5"/>
    <circle cx="178" cy="521" r="0.9" fill="white" opacity="0.45"/>
    <circle cx="1050" cy="505" r="1.3" fill="white" opacity="0.5"/>
    <circle cx="1138" cy="465" r="0.8" fill="#c4b5fd" opacity="0.55"/>
    <!-- 閃爍大星 -->
    <circle cx="172" cy="82" r="2.5" fill="white" opacity="0.95"/>
    <circle cx="1028" cy="95" r="2.2" fill="#e0e7ff" opacity="0.9"/>
    <circle cx="600" cy="15" r="2.0" fill="#a5b4fc" opacity="0.85"/>
  </g>

  <!-- ========== 頂部光束（劇場感）========== -->
  <polygon points="600,0 530,420 670,420" fill="url(#beamGrad)"/>

  <!-- ========== 3D 旋轉木馬卡片群 ========== -->
  <!-- 地板倒影橢圓 -->
  <ellipse cx="600" cy="490" rx="350" ry="45" fill="url(#floorRef)"/>

  <!-- === 後排左側卡片（最遠，最暗）=== -->
  <g transform="translate(210, 235) rotate(-12) scale(0.62)" opacity="0.28">
    <rect width="160" height="220" rx="10" fill="#1a1040" stroke="#4c1d95" stroke-width="1.5"/>
    <rect width="160" height="220" rx="10" fill="url(#glassGrad)"/>
    <rect x="10" y="10" width="140" height="160" rx="6" fill="#2d1b69" opacity="0.8"/>
    <rect x="10" y="178" width="140" height="32" rx="0 0 6 6" fill="#0a0520" opacity="0.6"/>
  </g>

  <!-- === 後排右側卡片（最遠，最暗）=== -->
  <g transform="translate(868, 235) rotate(12) scale(0.62)" opacity="0.28">
    <rect width="160" height="220" rx="10" fill="#1a1040" stroke="#4c1d95" stroke-width="1.5"/>
    <rect width="160" height="220" rx="10" fill="url(#glassGrad)"/>
    <rect x="10" y="10" width="140" height="160" rx="6" fill="#2d1b69" opacity="0.8"/>
  </g>

  <!-- === 中排左側卡片 === -->
  <g transform="translate(278, 200) rotate(-8) scale(0.76)" opacity="0.52">
    <rect width="175" height="245" rx="11" fill="#1e1356" stroke="#6d28d9" stroke-width="1.5"/>
    <rect width="175" height="245" rx="11" fill="url(#glassGrad)"/>
    <!-- 假圖片（山景色塊） -->
    <rect x="10" y="10" width="155" height="178" rx="7" fill="#2d2080"/>
    <rect x="10" y="138" width="155" height="50" rx="0" fill="#1e3a5f" opacity="0.9"/>
    <ellipse cx="87" cy="95" rx="65" ry="45" fill="#3b82f6" opacity="0.3"/>
    <polygon points="20,165 87,95 154,165" fill="#1e3a5f" opacity="0.6"/>
    <polygon points="50,165 95,115 140,165" fill="#0f2744" opacity="0.5"/>
    <!-- 底部資訊列 -->
    <rect x="10" y="195" width="155" height="40" rx="0 0 8 8" fill="#0d0a2a" opacity="0.75"/>
    <rect x="18" y="204" width="80" height="6" rx="3" fill="#8b5cf6" opacity="0.6"/>
    <rect x="18" y="216" width="55" height="5" rx="2.5" fill="#6d6d9a" opacity="0.5"/>
  </g>

  <!-- === 中排右側卡片 === -->
  <g transform="translate(758, 200) rotate(8) scale(0.76)" opacity="0.52">
    <rect width="175" height="245" rx="11" fill="#1e1356" stroke="#6d28d9" stroke-width="1.5"/>
    <rect width="175" height="245" rx="11" fill="url(#glassGrad)"/>
    <!-- 假圖片（城市夜景） -->
    <rect x="10" y="10" width="155" height="178" rx="7" fill="#1a2a48"/>
    <!-- 城市燈光效果 -->
    <rect x="10" y="140" width="155" height="48" rx="0" fill="#0a1628"/>
    <circle cx="87" cy="75" r="38" fill="#f59e0b" opacity="0.12"/>
    <rect x="25" y="80" width="8" height="60" fill="#f59e0b" opacity="0.5"/>
    <rect x="40" y="95" width="10" height="45" fill="#f59e0b" opacity="0.4"/>
    <rect x="60" y="70" width="12" height="70" fill="#ec4899" opacity="0.4"/>
    <rect x="80" y="88" width="8" height="52" fill="#f59e0b" opacity="0.5"/>
    <rect x="100" y="78" width="10" height="62" fill="#6366f1" opacity="0.5"/>
    <rect x="118" y="92" width="8" height="48" fill="#f59e0b" opacity="0.4"/>
    <rect x="135" y="105" width="10" height="35" fill="#f59e0b" opacity="0.45"/>
    <!-- 底部資訊 -->
    <rect x="10" y="195" width="155" height="40" rx="0 0 8 8" fill="#0d0a2a" opacity="0.75"/>
    <rect x="18" y="204" width="75" height="6" rx="3" fill="#f59e0b" opacity="0.6"/>
    <rect x="18" y="216" width="50" height="5" rx="2.5" fill="#6d6d9a" opacity="0.5"/>
  </g>

  <!-- === 主卡片（最前方，最大最亮）=== -->
  <g transform="translate(470, 148)" filter="url(#glowFilter)">
    <!-- 卡片發光邊框 -->
    <rect x="-4" y="-4" width="268" height="348" rx="16" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.7"/>
    <!-- 卡片底色 -->
    <rect width="260" height="340" rx="13" fill="#1e1356" stroke="#6d28d9" stroke-width="1.5"/>
    <!-- 玻璃反光層 -->
    <rect width="260" height="340" rx="13" fill="url(#glassGrad)"/>
    <!-- 主圖片區域（風景） -->
    <rect x="10" y="10" width="240" height="272" rx="9" fill="#0f2744"/>
    <!-- 天空漸層 -->
    <rect x="10" y="10" width="240" height="160" rx="9 9 0 0" fill="#1e3a6e"/>
    <!-- 山丘剪影 -->
    <polygon points="10,282 130,155 250,282" fill="#061628" opacity="0.9"/>
    <polygon points="60,282 155,190 250,282" fill="#040f1f" opacity="0.95"/>
    <!-- 太陽/月亮 -->
    <circle cx="155" cy="75" r="34" fill="#f59e0b" opacity="0.18"/>
    <circle cx="155" cy="75" r="22" fill="#fbbf24" opacity="0.35"/>
    <!-- 雲彩 -->
    <ellipse cx="80" cy="100" rx="40" ry="12" fill="white" opacity="0.08"/>
    <ellipse cx="95" cy="95" rx="28" ry="9" fill="white" opacity="0.06"/>
    <ellipse cx="210" cy="115" rx="32" ry="10" fill="white" opacity="0.07"/>
    <!-- 水面倒影 -->
    <rect x="10" y="240" width="240" height="42" rx="0" fill="#0a1c35" opacity="0.7"/>
    <ellipse cx="130" cy="260" rx="55" ry="10" fill="#fbbf24" opacity="0.15"/>
    <!-- 底部資訊列 -->
    <rect x="10" y="289" width="240" height="41" rx="0 0 9 9" fill="#05091a" opacity="0.88"/>
    <text x="20" y="309" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.9">日落山景倒影</text>
    <text x="20" y="324" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#94a3b8">2024-07-15</text>
    <!-- 標籤徽章 -->
    <rect x="186" y="297" width="54" height="20" rx="10" fill="#6366f1" opacity="0.85"/>
    <text x="213" y="311" font-family="'Segoe UI', Arial, sans-serif" font-size="9.5" fill="white" text-anchor="middle">🌄 風景</text>
    <!-- 右上放大提示 -->
    <circle cx="238" cy="24" r="12" fill="white" opacity="0.12"/>
    <text x="238" y="29" font-family="Arial" font-size="11" fill="white" text-anchor="middle" opacity="0.7">⤢</text>
  </g>

  <!-- 主卡片地板倒影 -->
  <g transform="translate(470, 490) scale(1, -0.22)" opacity="0.3">
    <rect width="260" height="60" rx="13 13 0 0" fill="#1e1356"/>
    <rect x="10" y="0" width="240" height="60" rx="9 9 0 0" fill="#0f2744"/>
    <rect x="10" y="0" width="240" height="60" rx="0" fill="url(#floorRef)"/>
  </g>

  <!-- ========== 頂部標題區 ========== -->
  <!-- 標題光暈背景 -->
  <ellipse cx="600" cy="88" rx="280" ry="55" fill="#6366f1" opacity="0.08"/>
  <!-- 主標題 -->
  <text x="600" y="76" font-family="'Segoe UI', 'Microsoft JhengHei', '微軟正黑體', sans-serif"
    font-size="46" font-weight="800" fill="white" text-anchor="middle"
    filter="url(#textGlow)" letter-spacing="3" opacity="0.95">
    專屬創意 3D 畫廊
  </text>
  <!-- 副標題（功能列點） -->
  <text x="600" y="105" font-family="'Segoe UI', 'Microsoft JhengHei', sans-serif"
    font-size="16" fill="#a5b4fc" text-anchor="middle" letter-spacing="4" opacity="0.85">
    拖曳旋轉 · 雲端同步 · 無限收藏 · 多主題切換
  </text>
  <!-- 頂部分隔線 -->
  <line x1="380" y1="116" x2="820" y2="116" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>

  <!-- ========== 底部標籤篩選區 ========== -->
  <!-- 底部半透明欄 -->
  <rect x="0" y="555" width="1200" height="75" rx="0" fill="#010208" opacity="0.65"/>
  <line x1="0" y1="555" x2="1200" y2="555" stroke="#6366f1" stroke-width="0.8" opacity="0.35"/>

  <!-- 標籤按鈕 -->
  <!-- 全部（已選中） -->
  <rect x="200" y="572" width="72" height="28" rx="14" fill="#6366f1"/>
  <text x="236" y="590" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700"
    fill="white" text-anchor="middle">✦ 全部</text>

  <!-- 風景 -->
  <rect x="284" y="572" width="68" height="28" rx="14" fill="none" stroke="#6366f1" stroke-width="1.2" opacity="0.6"/>
  <text x="318" y="590" font-family="'Segoe UI', Arial, sans-serif" font-size="12"
    fill="#a5b4fc" text-anchor="middle" opacity="0.85">🌄 風景</text>

  <!-- 人物 -->
  <rect x="364" y="572" width="68" height="28" rx="14" fill="none" stroke="#6366f1" stroke-width="1.2" opacity="0.6"/>
  <text x="398" y="590" font-family="'Segoe UI', Arial, sans-serif" font-size="12"
    fill="#a5b4fc" text-anchor="middle" opacity="0.85">🧑 人物</text>

  <!-- 美食 -->
  <rect x="444" y="572" width="68" height="28" rx="14" fill="none" stroke="#6366f1" stroke-width="1.2" opacity="0.6"/>
  <text x="478" y="590" font-family="'Segoe UI', Arial, sans-serif" font-size="12"
    fill="#a5b4fc" text-anchor="middle" opacity="0.85">🍜 美食</text>

  <!-- 旅行 -->
  <rect x="524" y="572" width="68" height="28" rx="14" fill="none" stroke="#6366f1" stroke-width="1.2" opacity="0.6"/>
  <text x="558" y="590" font-family="'Segoe UI', Arial, sans-serif" font-size="12"
    fill="#a5b4fc" text-anchor="middle" opacity="0.85">🏝 旅行</text>

  <!-- 建築 -->
  <rect x="604" y="572" width="68" height="28" rx="14" fill="none" stroke="#6366f1" stroke-width="1.2" opacity="0.6"/>
  <text x="638" y="590" font-family="'Segoe UI', Arial, sans-serif" font-size="12"
    fill="#a5b4fc" text-anchor="middle" opacity="0.85">🏛 建築</text>

  <!-- 動物 -->
  <rect x="684" y="572" width="68" height="28" rx="14" fill="none" stroke="#6366f1" stroke-width="1.2" opacity="0.6"/>
  <text x="718" y="590" font-family="'Segoe UI', Arial, sans-serif" font-size="12"
    fill="#a5b4fc" text-anchor="middle" opacity="0.85">🐾 動物</text>

  <!-- 右側 badge：GitHub Pages -->
  <rect x="920" y="570" width="170" height="32" rx="16" fill="#1e1b4b" stroke="#4f46e5" stroke-width="1"/>
  <text x="1005" y="591" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600"
    fill="#a5b4fc" text-anchor="middle">✨ Interactive 3D Gallery</text>

  <!-- ========== 左右裝飾光條 ========== -->
  <rect x="0" y="100" width="3" height="430" rx="2" fill="#6366f1" opacity="0.35"/>
  <rect x="1197" y="100" width="3" height="430" rx="2" fill="#6366f1" opacity="0.35"/>

  <!-- ========== 角落裝飾 ========== -->
  <!-- 左上 -->
  <path d="M 0 40 L 40 0" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <path d="M 0 70 L 70 0" stroke="#6366f1" stroke-width="0.8" opacity="0.2"/>
  <!-- 右上 -->
  <path d="M 1200 40 L 1160 0" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <path d="M 1200 70 L 1130 0" stroke="#6366f1" stroke-width="0.8" opacity="0.2"/>
  <!-- 左下 -->
  <path d="M 0 590 L 40 630" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
  <!-- 右下 -->
  <path d="M 1200 590 L 1160 630" stroke="#6366f1" stroke-width="1.5" opacity="0.4"/>
</svg>
