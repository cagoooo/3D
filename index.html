        /* ===== CSS 主題變數（功能一：多主題）===== */
        :root {

        /* 5 套主題 */
        [data-theme="cosmos"] {
            --bg-from: #1a1a2e;

            --accent: #6366f1;

        [data-theme="sunset"] {

        }

        }

        [data-theme="gold"] {
            --bg-from: #1e1700;

        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-to);
            background-image: radial-gradient(circle at center, var(--bg-from) 0%, var(--bg-to) 100%);
            transition: background-color 0.6s ease, background-image 0.6s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            touch-action: none;
        }

        /* ===== 3D 場景 ===== */
        .scene {
            width: 100vw;
            height: 100vh;
            perspective: var(--perspective);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* ===== 旋轉木馬 ===== */
        .carousel {
            width: var(--card-w, 260px);
            height: var(--card-h, 380px);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            cursor: grab;
        }

        .carousel:active {
            cursor: grabbing;
        }

        /* ===== 卡片 ===== */
        .carousel-item {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            border-radius: 12px;
            overflow: visible;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8), 0 0 10px rgba(255, 255, 255, 0.1) inset;
            user-select: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .carousel-item .img-wrap {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            filter: brightness(0.8);
            transition: filter 0.3s;
            display: block;
        }

        .carousel-item:hover img {
            filter: brightness(1.15);
        }

        @supports (-webkit-box-reflect: below) {
            .carousel-item .img-wrap {
                -webkit-box-reflect: below 15px linear-gradient(transparent, transparent, rgba(0, 0, 0, 0.3));
            }
        }

        @supports not (-webkit-box-reflect: below) {
            .carousel-item::after {
                content: '';
                position: absolute;
                top: 100%;
                margin-top: 15px;
                left: 0;
                width: 100%;
                height: 40%;
                border-radius: 12px;
                transform: scaleY(-1);
                opacity: 0.25;
                -webkit-mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.4), transparent);
                mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.4), transparent);
                pointer-events: none;
            }
        }

        /* 浮層說明 */
        .carousel-item .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 28px 14px 14px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.78));
            border-radius: 0 0 12px 12px;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }

        .carousel-item:hover .caption {
            opacity: 1;
            transform: translateY(0);
        }

        .caption-title {
            font-size: .82rem;
            font-weight: 600;
            color: #fff;
            margin: 0 0 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .caption-date {
            font-size: .68rem;
            color: rgba(255, 255, 255, .55);
            margin: 0;
        }

        /* 放大提示 */

            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .15);

            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .75rem;
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
        }

        .carousel-item:hover .click-hint {
            opacity: 1;
        }

        /* ===== 雲端同步進度條 ===== */
        #sync-overlay {

        }

        #logout-btn:hover {
            background: rgba(239, 68, 68, .35);
        }

        #cloud-sync-btn {
            padding: 5px 14px;
            border-radius: 50px;
            font-size: .72rem;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .2);
            color: rgba(255, 255, 255, .7);
            display: none;
            transition: background .2s;
        }

        #cloud-sync-btn:hover {
            background: rgba(255, 255, 255, .18);
            color: #fff;
        }

        #cloud-restore-btn {
            padding: 5px 14px;
            border-radius: 50px;
            font-size: .72rem;
            font-weight: 600;
            cursor: pointer;
            background: rgba(96, 165, 250, .15);
            border: 1px solid rgba(96, 165, 250, .4);
            color: rgba(147, 197, 253, .9);
            display: none;
            transition: background .2s;
        }

        #cloud-restore-btn:hover {
            background: rgba(96, 165, 250, .3);
            color: #fff;
        }

        #delete-all-btn {
            padding: 5px 14px;
            border-radius: 50px;
            font-size: .72rem;
            font-weight: 600;
            cursor: pointer;
            background: rgba(239, 68, 68, .15);
            border: 1px solid rgba(239, 68, 68, .45);
            color: rgba(252, 165, 165, .9);
            display: none;
            transition: background .2s;
        }

        #delete-all-btn:hover {
            background: rgba(239, 68, 68, .35);
            color: #fff;
        }

        /* 確認刪除 modal */
        #delete-confirm-modal {
            position: fixed;
            inset: 0;
            z-index: 1001;
            background: rgba(0, 0, 0, .65);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .28s;
        }

        #delete-confirm-modal.show {
            opacity: 1;
            pointer-events: all;
        }

        .del-modal-box {
            background: rgba(15, 23, 42, .95);
            border: 1px solid rgba(239, 68, 68, .35);
            border-radius: 20px;
            padding: 2rem 2.2rem;
            max-width: 380px;
            width: 90vw;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .6);
        }

        .del-modal-icon {
            font-size: 2.4rem;
        }

        .del-modal-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #fca5a5;
        }

        .del-modal-desc {
            font-size: .82rem;
            color: #94a3b8;
            line-height: 1.6;
        }

        .del-modal-btns {
            display: flex;
            gap: .75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .del-modal-btns button {
            flex: 1;
            padding: .55rem 1rem;
            border-radius: 999px;
            border: none;
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }

        #del-cancel-btn {
            background: rgba(255, 255, 255, .1);
            color: #cbd5e1;
        }

        #del-cancel-btn:hover {
            background: rgba(255, 255, 255, .18);
        }

        #del-confirm-btn {
            background: #dc2626;
            color: #fff;
        }

        #del-confirm-btn:hover {
            background: #b91c1c;
        }

        /* ===== 控制面板 ===== */
        .control-panel {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: var(--panel-bg);
            padding: 14px 22px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--panel-border);
            transition: background 0.6s, opacity 0.8s ease;
        }

        /* 自動淡出狀態 */
        .control-panel.panel-dim {
            opacity: 0.15;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        #file-upload {
            display: none;
        }

        /* ===== 功能AE：批次上傳進度條 ===== */
        #upload-progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            display: none;
            flex-direction: column;
            background: rgba(10, 10, 30, .92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, .08);
            padding: 10px 20px 12px;
        }

        #upload-progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, .12);
            border-radius: 99px;
            overflow: hidden;
            margin-top: 8px;
        }

        #upload-progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 99px;
            background: linear-gradient(90deg, #6366f1, #a78bfa, #38bdf8);
            background-size: 200% 100%;
            transition: width .3s ease;
            animation: uploadShimmer 1.5s linear infinite;
        }

        @keyframes uploadShimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        #upload-progress-label {
            font-size: .78rem;
            color: rgba(255, 255, 255, .7);
            letter-spacing: .02em;
        }

        #upload-progress-count {
            font-size: .72rem;
            color: rgba(148, 163, 184, .8);
            margin-left: auto;
        }

        #upload-progress-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }


        /* ===== 功能一：主題色票 ===== */
        .theme-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .theme-row label {
            font-size: .65rem;
            color: rgba(255, 255, 255, .4);
            margin-right: 2px;
        }

        .theme-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform .2s, border-color .2s;
        }

        .theme-dot:hover {
            transform: scale(1.25);
        }

        .theme-dot.active {
            border-color: #fff;
            transform: scale(1.2);
        }

        /* ===== RWD ===== */
        @media (max-width:768px) {
            .carousel {
                width: 200px;
                height: 300px;
            }

            .control-panel {
                bottom: 12px;
                width: 94%;
                padding: 10px 12px;
            }

            .lb-arrow {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }

            #lb-prev {
                left: 4px;
            }

            #lb-next {
                right: 4px;
            }
        }

        /* ===== 功能B：粒子畫布 ===== */
        #particle-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .scene {
            z-index: 1;
        }

        /* ===== 功能D：卡片翻轉雙面 ===== */
        .carousel-item-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.65s cubic-bezier(.2, .8, .2, 1);
            border-radius: 12px;
        }

        .carousel-item.flipped .carousel-item-inner {
            transform: rotateY(180deg) !important;
            animation: none !important;
            /* 翻面時停止一切動畫干擾 */
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 12px;
        }

        .card-front {
            overflow: hidden;
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, rgba(18, 18, 42, 0.97), rgba(6, 6, 18, 0.99));
            border: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px 14px;
            text-align: center;
        }

        .back-icon {
            font-size: 2rem;
            margin-bottom: 4px;
        }

        .back-title {
            font-size: .9rem;
            font-weight: 700;
            color: #fff;
            margin: 0;
            line-height: 1.35;
        }

        .back-date {
            font-size: .7rem;
            color: rgba(255, 255, 255, .45);
            margin: 0;
        }

        .back-tag-badge {
            padding: 3px 14px;
            border-radius: 50px;
            background: var(--accent);
            font-size: .7rem;
            font-weight: 600;
            color: #fff;
        }

        /* 翻面按鈕 */
        .flip-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .15);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, .25);
            color: #fff;
            font-size: .7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity .3s, background .2s;
            z-index: 20;
        }

        .carousel-item:hover .flip-btn {
            opacity: 1;
        }

        .flip-btn:hover {
            background: rgba(255, 255, 255, .3);
        }

        .back-flip-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .1);
            border: 1px solid rgba(255, 255, 255, .2);
            color: #fff;
            font-size: .7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: .6;
            transition: opacity .2s, background .2s;
        }

        .back-flip-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, .25);
        }

        /* ===== 功能C：縮圖帶 ===== */
        #thumb-strip {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 76px;
            z-index: 8;
            display: flex;
            align-items: center;
            overflow-x: auto;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, .55);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, .07);
            transform: translateY(100%);
            transition: transform .35s cubic-bezier(.2, .8, .2, 1);
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, .15) transparent;
        }

        #thumb-strip.visible {
            transform: translateY(0);
        }

        .thumb-item {
            flex-shrink: 0;
            width: 46px;
            height: 58px;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color .2s, transform .2s;
            position: relative;
        }

        .thumb-item:hover {
            transform: scale(1.12);
            border-color: var(--accent);
        }

        .thumb-item.active {
            border-color: #fff;
            box-shadow: 0 0 8px rgba(255, 255, 255, .4);
        }

        .thumb-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .thumb-num {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            font-size: .48rem;
            color: rgba(255, 255, 255, .8);
            text-align: center;
            background: rgba(0, 0, 0, .45);
            padding: 1px 0;
        }

        /* ===== 功能E：編輯模式 ===== */
        .carousel-item.edit-mode-active {
            outline: 2px dashed rgba(251, 191, 36, .7);
            outline-offset: 3px;
            cursor: grab;
        }

        .carousel-item.drag-over {
            outline-color: #22c55e;
        }

        .card-delete-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(220, 38, 38, .85);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: transform .15s, background .15s;
            backdrop-filter: blur(4px);
        }

        .card-delete-btn:hover {
            transform: scale(1.2);
            background: #dc2626;
        }

        /* ===== 功能H：批次操作列 ===== */
        #bulk-bar {
            position: fixed;
            top: -60px;
            left: 0;
            right: 0;
            height: 52px;
            background: rgba(15, 23, 42, .92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, .08);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 9000;
            transition: top .3s cubic-bezier(.2, .8, .2, 1);
        }

        #bulk-bar.show {
            top: 0;
        }

        #bulk-bar .bulk-count {
            color: #94a3b8;
            font-size: .85rem;
        }

        #bulk-bar button {
            padding: 6px 16px;
            border-radius: 999px;
            border: none;
            font-size: .82rem;
            cursor: pointer;
            font-weight: 600;
            transition: transform .15s;
        }

        #bulk-bar button:hover {
            transform: scale(1.05);
        }

        #bulk-select-all {
            background: #334155;
            color: #e2e8f0;
        }

        #bulk-delete-btn {
            background: #dc2626;
            color: #fff;
        }

        #bulk-cancel-btn {
            background: #475569;
            color: #e2e8f0;
        }

        .carousel-item.bulk-selected::after {
            content: '✓';
            position: absolute;
            top: 8px;
            left: 8px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 25;
        }

        /* ===== 功能F：Lightbox 標題可編輯 ===== */
        #lb-title[contenteditable="true"] {
            outline: 2px solid var(--accent);
            border-radius: 4px;
            padding: 0 4px;
            background: rgba(255, 255, 255, .06);
            cursor: text;
            min-width: 60px;
        }

        #lb-title::after {
            content: ' ✏️';
            font-size: .7em;
            opacity: 0;
            transition: opacity .2s;
        }

        #lb-title:hover::after {
            opacity: .6;
        }

        /* ===== 功能W：進場波浪動畫（套用在 inner 過渡蛋形容器，防止覆蓋 3D rotateY+translateZ）===== */
        @keyframes cardEnterW {
            from {
                opacity: 0;
                transform: scale(0.82) translateY(24px);
                filter: blur(4px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }

        .entering-wave {
            animation: cardEnterW .45s cubic-bezier(.22, 1, .36, 1) both;
        }

        /* ===== 功能AA：公開相簿開關按鈕 ===== */
        #public-toggle-btn {
            display: none;
            /* 登入後才顯示 */
            transition: background 0.25s, transform 0.15s;
        }

        #public-toggle-btn.is-public {
            background: rgba(34, 197, 94, 0.25) !important;
            border: 1px solid rgba(34, 197, 94, 0.5) !important;
            color: #86efac !important;
        }

        #public-toggle-btn.is-public:hover {
            background: rgba(34, 197, 94, 0.38) !important;
        }

        /* ===== 功能AB：相機型號强章 ===== */
        .camera-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            padding: 3px 10px;
            background: rgba(99, 102, 241, 0.18);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 50px;
            font-size: .68rem;
            color: #a5b4fc;
            letter-spacing: .02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }

        @keyframes themeFade {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        body.theme-switching::before {
            animation: themeFade .55s ease both;
        }

        /* ===== 功能U：版型設定抽屜 ===== */
        #layout-drawer {
            position: fixed;
            right: -240px;
            top: 50%;
            transform: translateY(-50%);
            width: 220px;
            background: rgba(15, 23, 42, .96);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 16px 0 0 16px;
            padding: 18px 16px 18px 20px;
            z-index: 8000;
            transition: right .35s cubic-bezier(.2, .8, .2, 1);
            backdrop-filter: blur(14px);
            box-shadow: -8px 0 32px rgba(0, 0, 0, .45);
        }

        #layout-drawer.open {
            right: 0;
        }

        #layout-toggle-btn {
            position: absolute;
            left: -38px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            background: rgba(15, 23, 42, .9);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 8px 0 0 8px;
            color: #e2e8f0;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s;
        }

        #layout-toggle-btn:hover {
            background: rgba(99, 102, 241, .4);
        }

        .layout-title {
            font-size: .75rem;
            font-weight: 700;
            color: #94a3b8;
            letter-spacing: .08em;
            margin-bottom: 14px;
            text-transform: uppercase;
        }

        .layout-row {
            margin-bottom: 14px;
        }

        .layout-row label {
            display: flex;
            justify-content: space-between;
            font-size: .72rem;
            color: #cbd5e1;
            margin-bottom: 5px;
        }

        .layout-row label span {
            color: var(--accent);
            font-weight: 600;
            min-width: 36px;
            text-align: right;
        }

        .layout-row input[type=range] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .layout-reset-btn {
            width: 100%;
            padding: 6px 0;
            margin-top: 4px;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 8px;
            color: #94a3b8;
            font-size: .72rem;
            cursor: pointer;
            transition: background .18s;
        }

        .layout-reset-btn:hover {
            background: rgba(255, 255, 255, .12);
        }

        /* ===== 功能Y：唯讀模式 ===== */
        body.readonly-mode .control-panel,
        body.readonly-mode #tag-manage-modal,
        body.readonly-mode #bulk-bar,
        body.readonly-mode #layout-drawer {
            display: none !important;
        }

        body.readonly-mode #tag-bar {
            top: 0;
        }

        #share-bar {
            display: none;
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, .9);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 12px;
            padding: 8px 18px;
            font-size: .78rem;
            color: #94a3b8;
            z-index: 7000;
            backdrop-filter: blur(12px);
            gap: 10px;
            align-items: center;
        }

        #share-bar.visible {
            display: flex;
        }

        #share-bar strong {
            color: #e2e8f0;
        }

        #share-bar a {
            color: var(--accent);
            text-decoration: none;
        }

        #share-link-btn {
            padding: 5px 14px;
            background: var(--accent);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: .75rem;
            cursor: pointer;
            transition: opacity .18s;
        }

        #share-link-btn:hover {
            opacity: .85;
        }

        /* ===== QR Code 分享 Modal ===== */
        #qr-modal {
            position: fixed;
            inset: 0;
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #qr-modal.show {
            opacity: 1;
            pointer-events: all;
        }

        .qr-box {
            background: linear-gradient(145deg, rgba(30, 30, 60, 0.97), rgba(15, 15, 35, 0.99));
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 32px 28px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: min(90vw, 340px);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.35s cubic-bezier(.34, 1.56, .64, 1);
        }

        #qr-modal.show .qr-box {
            transform: scale(1) translateY(0);
        }

        .qr-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: .02em;
        }

        .qr-subtitle {
            font-size: .75rem;
            color: rgba(255, 255, 255, .45);
            text-align: center;
            line-height: 1.5;
            margin-top: -8px;
        }

        #qr-canvas-wrap {
            background: #fff;
            border-radius: 16px;
            padding: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #qr-canvas-wrap canvas,
        #qr-canvas-wrap img {
            display: block;
            border-radius: 4px;
        }

        .qr-url-row {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .qr-url-input {
            flex: 1;
            background: rgba(255, 255, 255, .07);
            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 10px;

        // ================================================================
        //  功能G: 圖片壓縮前處理
        // ================================================================
        async function compressImage(file, maxWidth = 1200, quality = 0.85) {
            try {
                const img = await createImageBitmap(file);
                const ratio = Math.min(maxWidth / img.width, 1);
                const canvas = document.createElement('canvas');
                canvas.width = Math.round(img.width * ratio);
                canvas.height = Math.round(img.height * ratio);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                return new Promise((res, rej) => canvas.toBlob(b => b ? res(b) : rej(), 'image/webp', quality));
            } catch { return file; } // 失敗就用原檔
        }
        function blobToDataURL(blob) {
            return new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(blob); });
        }

        // ================================================================
        //  圖片上傳（改為先選標籤）
        // ================================================================
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            if (!files.length) return;

            e.target.value = '';
        });

        async function processUpload(files, tag) {
            stopAutoRotate();
            allImageData = [];

            // ── 功能AE：顯示進度條 ──────────────────────
            const upBar = document.getElementById('upload-progress-bar');
            const upFill = document.getElementById('upload-progress-fill');
            const upLabel = document.getElementById('upload-progress-label');
            const upCount = document.getElementById('upload-progress-count');
            const total = files.length;

            upFill.style.width = '0%';
            upLabel.textContent = '準備載入 EXIF 解析器…';
            upCount.textContent = `0 / ${total}`;
            upBar.style.display = 'flex';
            // ────────────────────────────────────────────

            // 功能AB：動態載入 exifr（約 8KB ESM，僅第一次需要網路請求）
            let exifrParse = null;
            try {
                const mod = await import('https://esm.sh/exifr@7/dist/lite.esm.js');
                exifrParse = mod.parse;
            } catch { /* 離線時降級，忽略 */ }

            for (let i = 0; i < total; i++) {
                const file = files[i];

                // 功能AE：更新進度
                const pct = Math.round((i / total) * 100);
                upFill.style.width = `${pct}%`;
                upLabel.textContent = `壓縮中：${file.name.replace(/\.[^.]+$/, '')}`;
                upCount.textContent = `${i + 1} / ${total}`;

                const compressed = await compressImage(file);
                const src = await blobToDataURL(compressed);

                // 功能AB：解析 EXIF
                let date = new Date(file.lastModified).toLocaleDateString('zh-TW');
                let camera = '';
                if (exifrParse) {
                    try {
                        const exif = await exifrParse(file, {
                            pick: ['DateTimeOriginal', 'Make', 'Model']
                        });
                        if (exif?.DateTimeOriginal) {
                            date = new Date(exif.DateTimeOriginal).toLocaleDateString('zh-TW');
                        }
                        camera = [exif?.Make, exif?.Model].filter(Boolean).join(' ').trim();
                    } catch { /* 無 EXIF，降級 */ }
                }

                allImageData.push({ src, title: file.name.replace(/\.[^.]+$/, ''), date, tag, camera });
            }

            // 功能AE：完成動畫
            upFill.style.width = '100%';
            upLabel.textContent = `✅ ${total} 張處理完成！`;
            upCount.textContent = '';
            setTimeout(() => { upBar.style.display = 'none'; }, 1800);

            activeTag = '全部';
            filteredData = [...allImageData];
            buildTagBar(); buildGallery();
            saveToLocalStorage();
            if (isAutoRotating) startAutoRotate();
            showBanner(`✅ 已載入 ${total} 張（WebP 壓縮）`, false);
        }

        // ================================================================
        //  建立畫廊（使用 filteredData）
        // ================================================================
        function buildGallery() {
            carousel.innerHTML = '';
            numImages = filteredData.length;
            if (!numImages) { carousel.innerHTML = '<p style="color:rgba(255,255,255,.3);font-size:.8rem;text-align:center;margin-top:140px;">此分類暫無圖片</p>'; return; }

            theta = 360 / numImages;
            // 正確半徑公式：由卡片寬度和張數決定，保證不重疊
            // r = (cardW + gap) / (2 * sin(π/n))
            const cardW = parseFloat(
                getComputedStyle(document.documentElement).getPropertyValue('--card-w')
            ) || 260;
            const GAP = 24; // 卡片間距（px）
            const r = numImages <= 1
                ? 0
                : Math.round((cardW + GAP) / (2 * Math.sin(Math.PI / numImages)));

            filteredData.forEach((data, i) => {
                const item = document.createElement('div');
                item.className = 'carousel-item';

                // ── 翻轉容器 ──
                const inner = document.createElement('div');
                inner.className = 'carousel-item-inner';
                // 功能W：波浪進場動畫——加在 inner 避免覆蓋 item 的 3D rotateY+translateZ
                inner.classList.add('entering-wave');
                inner.style.animationDelay = `${i * 0.05}s`;

                // ── 正面 ──
                const front = document.createElement('div');
                front.className = 'card-front';

                const wrap = document.createElement('div');
                wrap.className = 'img-wrap';

                const img = document.createElement('img');
                img.src = data.src; img.alt = data.title || `圖片 ${i + 1}`;
                img.onerror = () => { img.onerror = null; img.src = `https://picsum.photos/seed/${i}/800/1200`; };

                const caption = document.createElement('div');
                caption.className = 'caption';
                caption.innerHTML = `<p class="caption-title">${data.title || `圖片 ${i + 1}`}</p>
                             <p class="caption-date">${data.date || ''} · ${data.tag || ''}</p>`;

                const hint = document.createElement('div');
                hint.className = 'click-hint'; hint.textContent = '🔍';

                // 翻面按鈕（正面）
                const flipBtn = document.createElement('button');
                flipBtn.className = 'flip-btn'; flipBtn.title = '查看詳情';
                flipBtn.textContent = '🔄';
                flipBtn.addEventListener('pointerdown', e => { e.stopPropagation(); e.stopImmediatePropagation(); });
                flipBtn.addEventListener('click', e => {
                    e.stopPropagation(); e.stopImmediatePropagation();
                    item.classList.toggle('flipped');
                    updateThumbActive(i);
                });

                // ── 功能E: 編輯模式 — 刪除按鈕 + 拖曳 ──
                if (editMode) {
                    item.classList.add('edit-mode-active');
                    item.setAttribute('draggable', 'true');

                    const delBtn = document.createElement('button');
                    delBtn.className = 'card-delete-btn';
                    delBtn.title = '刪除此張';
                    delBtn.textContent = '×';
                    delBtn.addEventListener('mousedown', e => e.stopPropagation());
                    delBtn.addEventListener('click', e => {
                        e.stopPropagation();
                        const realIdx = allImageData.indexOf(filteredData[i]);
                        if (realIdx >= 0) { allImageData.splice(realIdx, 1); }
                        filteredData = activeTag === '全部' ? [...allImageData] : allImageData.filter(d => d.tag === activeTag);
                        saveToLocalStorage();
                        buildGallery();
                        showBanner('🗑 已刪除', false);
                    });
                    item.appendChild(delBtn);

                    // 拖曳事件
                    item.addEventListener('dragstart', () => { dragSrcIndex = i; item.style.opacity = '.4'; });
                    item.addEventListener('dragend', () => { item.style.opacity = ''; });
                    item.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('drag-over'); });
                    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
                    item.addEventListener('drop', e => {
                        e.preventDefault(); item.classList.remove('drag-over');
                        if (dragSrcIndex === null || dragSrcIndex === i) return;
                        // 在 allImageData 中找到對應實際索引
                        const srcReal = allImageData.indexOf(filteredData[dragSrcIndex]);
                        const dstReal = allImageData.indexOf(filteredData[i]);
                        if (srcReal < 0 || dstReal < 0) return;
                        [allImageData[srcReal], allImageData[dstReal]] = [allImageData[dstReal], allImageData[srcReal]];
                        filteredData = activeTag === '全部' ? [...allImageData] : allImageData.filter(d => d.tag === activeTag);
                        saveToLocalStorage(); buildGallery();
                        dragSrcIndex = null;
                    });
                }

                // ── 功能H: 批次選取 — 長按進入選取模式 ──
                if (selectMode && selectedIndices.has(i)) item.classList.add('bulk-selected');
                item.addEventListener('pointerdown', () => {
                    if (editMode) return;
                    longPressTimer = setTimeout(() => {
                        if (!selectMode) {
                            selectMode = true;
                            selectedIndices.add(i);
                            buildGallery(); // 重建顯示選取狀態
                        }
                        bulkBar.classList.add('show');
                        updateBulkCount();
                        if (isAutoRotating) stopAutoRotate();
                    }, 500);
                });
                item.addEventListener('pointerup', () => clearTimeout(longPressTimer));
                item.addEventListener('pointercancel', () => clearTimeout(longPressTimer));
                if (selectMode) {
                    item.addEventListener('click', e => {
                        e.stopPropagation();
                        if (selectedIndices.has(i)) selectedIndices.delete(i);
                        else selectedIndices.add(i);
                        item.classList.toggle('bulk-selected', selectedIndices.has(i));
                        updateBulkCount();
                    });
                }

                wrap.appendChild(img); wrap.appendChild(caption); wrap.appendChild(hint);
                front.appendChild(wrap); front.appendChild(flipBtn);

                // ── 背面 ──
                const back = document.createElement('div');
                back.className = 'card-back';
                const tagIcon = data.tag ? data.tag.split(' ')[0] : '🖼️';
                back.innerHTML = `
                    <div class="back-icon">${tagIcon}</div>
                    <h3 class="back-title">${data.title || `圖片 ${i + 1}`}</h3>
                    <p class="back-date">${data.date || '—'}</p>
                    ${data.tag ? `<div class="back-tag-badge">${data.tag}</div>` : ''}
                    ${data.camera ? `<div class="camera-badge">📷 ${data.camera}</div>` : ''}
                `;
                const backFlipBtn = document.createElement('button');
                backFlipBtn.className = 'back-flip-btn'; backFlipBtn.title = '翻回';
                backFlipBtn.textContent = '↩️';
                backFlipBtn.addEventListener('mousedown', e => e.stopPropagation());
                backFlipBtn.addEventListener('click', e => { e.stopPropagation(); item.classList.remove('flipped'); });
                back.appendChild(backFlipBtn);

                inner.appendChild(front); inner.appendChild(back);
                item.appendChild(inner);
                item.style.transform = `rotateY(${theta * i}deg) translateZ(${r}px)`;

                wrap.addEventListener('click', e => {
                    e.stopPropagation();
                    if (!item.classList.contains('flipped')) openLightbox(i);
                });
                carousel.appendChild(item);
            });

            // 重建縮圖帶
            buildThumbStrip();
        }

        // ================================================================
        //  功能F: Lightbox 標題行內編輯
        // ================================================================
        function enableLbTitleEdit(dataIdx) {
            lbTitle.setAttribute('contenteditable', 'true');
            lbTitle.title = '雙擊編輯標題';
            const commitEdit = () => {
                const newTitle = lbTitle.textContent.trim();
                lbTitle.removeAttribute('contenteditable');
                if (newTitle && newTitle !== allImageData[dataIdx]?.title) {
                    allImageData[dataIdx].title = newTitle;

        // ================================================================
        //  旋轉 & 慣性
        // ================================================================
        // ===== 功能A：視差偏移變數 =====
        let parallaxX = 0, parallaxY = 0;

        function applyTransform() {
            currentRotationX = Math.max(-40, Math.min(40, currentRotationX));
            const pX = isDragging ? 0 : parallaxX;
            const pY = isDragging ? 0 : parallaxY;
            carousel.style.transform = `rotateY(${currentRotationY + pY}deg) rotateX(${currentRotationX + pX}deg)`;
        }
        function applyInertia() {
            if (Math.abs(velocityX) > 0.06 || Math.abs(velocityY) > 0.06) {
                currentRotationY += velocityX; currentRotationX += velocityY;
                applyTransform();
                velocityX *= 0.93; velocityY *= 0.93;
                animationFrameId = requestAnimationFrame(applyInertia);
            }
        }

        // ================================================================
        //  拖曳
        // ================================================================
        function handleDragStart(e) {
            if (lbOpen) return;
            isDragging = true;
            startX = prevX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
            startY = prevY = e.type.includes('mouse') ? e.pageY : e.touches[0].pageY;
            cancelAnimationFrame(animationFrameId);
            carousel.style.transition = 'none';
        }
        function handleDragMove(e) {
            if (!isDragging || lbOpen) return;
            const cx = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
            const cy = e.type.includes('mouse') ? e.pageY : e.touches[0].pageY;
            velocityX = (cx - prevX) * 0.4;
            velocityY = (cy - prevY) * 0.2;
            currentRotationY += velocityX; currentRotationX += velocityY;
            applyTransform(); prevX = cx; prevY = cy;
        }
        function handleDragEnd() {
            isDragging = false;
            carousel.style.transition = 'transform 0.1s ease-out';
            applyInertia();
            // 拖曳結束後，如果自動旋轉開啟則延遲復原（等慣性殑滅後）
            if (isAutoRotating) setTimeout(() => startAutoRotate(), 800);
        }

        // ================================================================
        //  滾輪縮放
        // ================================================================
        document.addEventListener('wheel', e => {
            if (lbOpen) return;
            e.preventDefault();
            perspective = Math.max(400, Math.min(3000, perspective + e.deltaY * 1.2));
            scene.style.perspective = perspective + 'px';
        }, { passive: false });

        // ================================================================
        //  鍵盤
        // ================================================================
        document.addEventListener('keydown', e => {
            if (lbOpen) {
                if (e.key === 'ArrowLeft') { e.preventDefault(); lbShowIndex(lbCurrentIndex - 1); }
                if (e.key === 'ArrowRight') { e.preventDefault(); lbShowIndex(lbCurrentIndex + 1); }
                if (e.key === 'Escape') closeLightbox();
                return;
            }
            const step = theta || 45;
            switch (e.key) {
                case 'ArrowLeft': e.preventDefault(); cancelAnimationFrame(animationFrameId);
                    currentRotationY = Math.round(currentRotationY / step) * step - step;
                    carousel.style.transition = 'transform 0.5s cubic-bezier(.2,.8,.2,1)'; applyTransform(); break;
                case 'ArrowRight': e.preventDefault(); cancelAnimationFrame(animationFrameId);
                    currentRotationY = Math.round(currentRotationY / step) * step + step;
                    carousel.style.transition = 'transform 0.5s cubic-bezier(.2,.8,.2,1)'; applyTransform(); break;
                case 'ArrowUp': e.preventDefault();
                    currentRotationX = Math.max(-40, currentRotationX - 8);
                    carousel.style.transition = 'transform 0.3s ease-out'; applyTransform(); break;
                case 'ArrowDown': e.preventDefault();
                    currentRotationX = Math.min(40, currentRotationX + 8);
                    carousel.style.transition = 'transform 0.3s ease-out'; applyTransform(); break;
            }
        });

        //  Lightbox
        // ================================================================
        function openLightbox(idx) {
            lbOpen = true; lbCurrentIndex = idx;

            lightbox.classList.add('open');
            lbShowIndex(idx);
        }
        function closeLightbox() {
            lbOpen = false; lightbox.classList.remove('open');
            if (isAutoRotating) setTimeout(() => { velocityX = 0.5; velocityY = 0; applyInertia(); }, 350);
        }
        function lbShowIndex(idx) {
            lbCurrentIndex = ((idx % numImages) + numImages) % numImages;
            const data = filteredData[lbCurrentIndex];
            lbImg.style.opacity = 0;
            lbImg.src = data.src; lbImg.alt = data.title || '';

            lbTitle.textContent = data.title || `圖片 ${lbCurrentIndex + 1}`;

        // ================================================================
        //  自動旋轉（持續固定速度）
        // ================================================================
        function startAutoRotate() {
            if (autoRotateRafId) cancelAnimationFrame(autoRotateRafId);
            function tick() {
                if (!isDragging && !lbOpen && isAutoRotating) {
                    currentRotationY += autoRotateSpeed;
                    applyTransform();
                }
                if (isAutoRotating) autoRotateRafId = requestAnimationFrame(tick);
            }
            autoRotateRafId = requestAnimationFrame(tick);
        }
        function stopAutoRotate() {
            if (autoRotateRafId) { cancelAnimationFrame(autoRotateRafId); autoRotateRafId = null; }
            // 同時停止慣性
            cancelAnimationFrame(animationFrameId);
            velocityX = 0; velocityY = 0;
        }

        autoRotateBtn.addEventListener('click', () => {
            isAutoRotating = !isAutoRotating;

        // 轉速滑桿（放在版型抽屜裏）

        // ================================================================

        async function deleteAllPhotos() {
            const fb = window._fb;
            if (!fb || !currentUser) return;

            // 顯示進度框
            const syncOv = document.getElementById('sync-overlay');
            const syncFl = document.getElementById('sync-fill');
            const syncCt = document.getElementById('sync-count');
            const syncSt = document.getElementById('sync-status');
            const syncTi = syncOv ? syncOv.querySelector('.sync-title') : null;
            if (syncTi) syncTi.textContent = '🗑️ 刪除中...';
            if (syncOv) syncOv.querySelector('.sync-icon').textContent = '🗑️';
            if (syncFl) syncFl.style.width = '0%';
            if (syncCt) syncCt.textContent = '準備中...';
            if (syncSt) syncSt.textContent = '正在刪除 Firestore 資料...';
            if (syncOv) syncOv.classList.add('show');

            try {
                const uid = currentUser.uid;

                // ① 刪除 Firestore 所有圖片文件
                const snap = await fb.getDocs(fb.collection(fb.db, `users/${uid}/images`));
                const total = snap.docs.length;
                let done = 0;
                for (const d of snap.docs) {
                    await fb.deleteDoc(fb.doc(fb.db, `users/${uid}/images`, d.id));
                    done++;
                    if (syncCt) syncCt.textContent = `Firestore ${done} / ${total}`;
                    if (syncFl) syncFl.style.width = `${Math.round(done / Math.max(total, 1) * 50)}%`;
                }

                // ② 刪除 Firebase Storage 資料夾內所有檔案
                if (syncSt) syncSt.textContent = '正在刪除 Storage 檔案...';
                try {
                    const folderRef = fb.storageRef(fb.storage, `users/${uid}/images`);
                    const listResult = await fb.listAll(folderRef);
                    const files = listResult.items;
                    done = 0;
                    for (const fileRef of files) {
                        await fb.deleteObject(fileRef);
                        done++;
                        if (syncCt) syncCt.textContent = `Storage ${done} / ${files.length}`;
                        if (syncFl) syncFl.style.width = `${50 + Math.round(done / Math.max(files.length, 1) * 50)}%`;
                    }
                } catch (storErr) {
                    // Storage 刪除失敗不阻擋（可能本來就沒有 Storage 檔案）
                    console.warn('Storage 刪除跳過：', storErr.message);
                }

                // ③ 清除本機
                allImageData = [];
                filteredData = [];
                activeTag = '全部';
                localStorage.removeItem(LS_KEY_IMAGES);
                buildTagBar();
                buildGallery();

                if (syncFl) syncFl.style.width = '100%';
                if (syncCt) syncCt.textContent = '✅ 全部刪除完成';
                if (syncSt) syncSt.textContent = '本機與雲端已清空';
                setTimeout(() => { if (syncOv) syncOv.classList.remove('show'); }, 1200);
                showBanner('🗑️ 已刪除所有照片', false);

            } catch (e) {
                if (syncOv) syncOv.classList.remove('show');
                showBanner('❌ 刪除失敗：' + e.message, true);
            }
        }

        loginBtn.addEventListener('click', async () => {

        // 同步鎖：防止同步中途登出

        function showSyncProgress(current, total, statusText) {

        // 同步上傳到雲端

            const fb = window._fb;
            if (!fb || !currentUser) return;
            if (allImageData.length === 0) { showBanner('沒有圖片可以同步', true); return; }
            if (isSyncing) { showBanner('⏳ 同步中，請稍候…', false); return; }

            isSyncing = true;
            cloudSyncBtn.disabled = true;
            const total = allImageData.length;

            // 設定正確的 overlay 標題（避免殘留 syncFromCloud 的文字）
            const _syncTi = syncOverlay ? syncOverlay.querySelector('.sync-title') : null;
            const _syncIc = syncOverlay ? syncOverlay.querySelector('.sync-icon') : null;
            if (_syncTi) _syncTi.textContent = '☁️ 同步至雲端...';
            if (_syncIc) _syncIc.textContent = '☁️';

            showSyncProgress(0, total, '準備上傳...');

            try {
                for (let i = 0; i < total; i++) {
                    // 每張前確認仍在登入狀態
                    if (!currentUser) {
                        hideSyncProgress();
                        showBanner('⚠️ 登入逾時，同步中斷', true);
                        break;
                    }

                    const data = allImageData[i];
                    const docId = `img_${Date.now()}_${i}`;
                    const label = data.title || `圖片 ${i + 1}`;

                    showSyncProgress(i, total, `上傳中：${label}`);

                    // 若是 Base64，先上傳到 Storage
                    let url = data.src;
                    if (data.src.startsWith('data:')) {
                        const blob = await (await fetch(data.src)).blob();
                        const sRef = fb.storageRef(fb.storage,
                            `users/${currentUser.uid}/images/${docId}`);
                        await fb.uploadBytes(sRef, blob);
                        url = await fb.getDownloadURL(sRef);
                    }

                    // 寫入 Firestore
                    await fb.setDoc(
                        fb.doc(fb.collection(fb.db, `users/${currentUser.uid}/images`), docId),
                        { url, title: data.title, date: data.date, tag: data.tag, camera: data.camera || '', order: i }
                    );

                    showSyncProgress(i + 1, total, `✅ 已完成：${label}`);
                }

                // 完成
                showSyncProgress(total, total, '✅ 全部同步完成！');
                setTimeout(hideSyncProgress, 1200);
                showBanner(`☁️ ${total} 張圖片已同步到雲端！`, false);
            } catch (e) {
                hideSyncProgress();
                const msg = e.code === 'storage/unauthorized'
                    ? '❌ 權限不足，請重新登入後再同步'
                    : '同步失敗：' + e.message;

        // 從雲端載入

            if (syncOv) syncOv.classList.add('show');

            try {
                const snap = await fb.getDocs(
                    fb.query(fb.collection(fb.db, `users/${currentUser.uid}/images`),
                        fb.orderBy('order')));

                if (syncOv) syncOv.classList.remove('show');

                if (snap.empty) {
                    showBanner('☁️ 雲端上尚無圖片，請先同步上傳', false);
                    return;

                allImageData = snap.docs.map(d => ({

                    title: d.data().title || '',
                    date: d.data().date || '',
                    tag: d.data().tag || '',

                buildGallery();
                saveToLocalStorage();
                showBanner(`📲 雲端已還原 ${allImageData.length} 張圖片！`, false);
            } catch (e) {
                if (syncOv) syncOv.classList.remove('show');
                console.warn('載入雲端失敗', e);
                showBanner('❌ 雲端載入失敗：' + e.message, true);
            }

        // ================================================================
        //  功能A：滑鼠跟隨視差效果
        // ================================================================
        document.addEventListener('mousemove', (e) => {
            if (isDragging || lbOpen) return;
            const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
            const tx = ((e.clientY - cy) / cy) * -6;
            const ty = ((e.clientX - cx) / cx) * 6;
            parallaxX += (tx - parallaxX) * 0.1;
            parallaxY += (ty - parallaxY) * 0.1;
            applyTransform();
        });
        document.addEventListener('mouseleave', () => { parallaxX = 0; parallaxY = 0; applyTransform(); });

        // ================================================================
        //  功能B：粒子背景特效
        // ================================================================
        const particleCanvas = document.getElementById('particle-canvas');
        const pCtx = particleCanvas.getContext('2d');
        const PARTICLE_COUNT = 80;
        let particles = [];

        const THEME_RGB = {
            cosmos: '99,102,241', sunset: '249,115,22',
            forest: '34,197,94', rose: '236,72,153', gold: '234,179,8'
        };
        function getParticleRGB() {
            return THEME_RGB[document.body.getAttribute('data-theme')] || '99,102,241';
        }
        function initParticles() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
            particles = Array.from({ length: PARTICLE_COUNT }, () => ({
                x: Math.random() * particleCanvas.width,
                y: Math.random() * particleCanvas.height,
                vx: (Math.random() - 0.5) * 0.35,
                vy: (Math.random() - 0.5) * 0.35,
                size: Math.random() * 2 + 0.5,
                baseOpacity: Math.random() * 0.5 + 0.1,
                phase: Math.random() * Math.PI * 2,
            }));
        }
        function animateParticles(ts) {
            pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            const rgb = getParticleRGB();
            const t = ts * 0.001;
            particles.forEach(p => {
                const alpha = p.baseOpacity * (0.5 + 0.5 * Math.sin(t * 0.8 + p.phase));
                pCtx.beginPath();
                pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                pCtx.fillStyle = `rgba(${rgb},${alpha.toFixed(2)})`;
                pCtx.fill();
                p.x += p.vx; p.y += p.vy;
                if (p.x < -5) p.x = particleCanvas.width + 5;
                if (p.x > particleCanvas.width + 5) p.x = -5;
                if (p.y < -5) p.y = particleCanvas.height + 5;
                if (p.y > particleCanvas.height + 5) p.y = -5;
            });
            requestAnimationFrame(animateParticles);
        }
        initParticles();
        requestAnimationFrame(animateParticles);

        // ================================================================
        //  功能C：縮圖帶
        // ================================================================
        let thumbStripVisible = false;

        function buildThumbStrip() {
            thumbStrip.innerHTML = '';
            filteredData.forEach((data, i) => {
                const el = document.createElement('div');
                el.className = 'thumb-item';
                const img = document.createElement('img');
                img.src = data.src; img.alt = '';
                img.onerror = () => { img.src = `https://picsum.photos/seed/${i}/100/120`; };
                const num = document.createElement('div');
                num.className = 'thumb-num'; num.textContent = i + 1;
                el.appendChild(img); el.appendChild(num);
                el.addEventListener('click', () => {
                    currentRotationY = -(theta * i);
                    carousel.style.transition = 'transform 0.6s cubic-bezier(.2,.8,.2,1)';
                    applyTransform();
                    updateThumbActive(i);
                });
                thumbStrip.appendChild(el);
            });
        }

        function updateThumbActive(idx) {
            thumbStrip.querySelectorAll('.thumb-item').forEach((el, i) => {
                el.classList.toggle('active', i === idx);
            });
        }

        thumbToggleBtn.addEventListener('click', () => {
            thumbStripVisible = !thumbStripVisible;
            thumbStrip.classList.toggle('visible', thumbStripVisible);
            thumbToggleBtn.textContent = thumbStripVisible ? '🎞️ 隱藏縮圖' : '🎞️ 縮圖';
        });

        // ================================================================
        //  拖曳 & 觸控事件
        // ================================================================
        document.addEventListener('mousedown', handleDragStart);
        document.addEventListener('mousemove', handleDragMove);
        document.addEventListener('mouseup', handleDragEnd);
        document.addEventListener('touchstart', handleDragStart, { passive: true });
        document.addEventListener('touchmove', handleDragMove, { passive: true });
        document.addEventListener('touchend', handleDragEnd);
        window.addEventListener('resize', () => { initParticles(); buildGallery(); });

        // ================================================================
        //  初始化
        // ================================================================
        const restored = loadFromLocalStorage();
        if (!restored) allImageData = [...DEFAULT_IMAGE_DATA];
        filteredData = [...allImageData];

        buildTagBar();
        buildGallery();
        startAutoRotate();

        if (restored) showBanner(`📂 已還原 ${allImageData.length} 張圖片`, false);

        // Firebase 初始化（帶延遲等待模組）
        initFirebase();

        // ── 控制面板自動淡出（5秒後淡至半透明，hover 恢復）────────────────
        const _panel = document.querySelector('.control-panel');
        let _panelTimer = null;

        function panelStartTimer() {
            clearTimeout(_panelTimer);
            _panelTimer = setTimeout(() => {
                _panel.classList.add('panel-dim');
            }, 5000);
        }

        function panelWake() {
            _panel.classList.remove('panel-dim');
            panelStartTimer();
        }

        // 滑鼠進入面板時恢復
        _panel.addEventListener('mouseenter', () => {
            _panel.classList.remove('panel-dim');
            clearTimeout(_panelTimer);
        });

        // 滑鼠離開面板後重新開始計時
        _panel.addEventListener('mouseleave', panelStartTimer);

        // 任何滑鼠移動都重置計時（讓整體互動時不淡出）
        document.addEventListener('mousemove', panelWake, { passive: true });

        // 觸控裝置：觸碰時恢復
        document.addEventListener('touchstart', panelWake, { passive: true });

        // 頁面載入後開始第一次計時
        panelStartTimer();
        // ──────────────────────────────────────────────────────────────────

    </script>

    <!-- 功能AE：批次上傳進度條 -->
    <div id="upload-progress-bar">
        <div id="upload-progress-header">
            <span id="upload-progress-label">準備中…</span>
            <span id="upload-progress-count"></span>
        </div>
        <div id="upload-progress-track">
            <div id="upload-progress-fill"></div>
        </div>
    </div>

</body>
