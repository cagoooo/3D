    <script>
        'use strict';
        // ================================================================
        //  常數
        // ================================================================
        const LS_KEY_IMAGES = 'gallery_3d_v4_images';
        const LS_KEY_THEME = 'gallery_3d_v4_theme';
        const LS_KEY_CUSTOM_TAGS = 'gallery_3d_v4_custom_tags';
        const LS_KEY_LAYOUT = 'gallery_3d_v4_layout'; // 功能U
        const DEFAULT_TAGS = ['全部', '🌄 風景', '👤 人物', '🍜 美食', '✈️ 旅行', '🎨 其他'];
        // 動態 TAGS：合併預設 + 自訂
        let customTags = JSON.parse(localStorage.getItem(LS_KEY_CUSTOM_TAGS) || '[]');
        let TAGS = [...DEFAULT_TAGS, ...customTags.filter(t => !DEFAULT_TAGS.includes(t))];
        function syncTags() {
            TAGS = [...DEFAULT_TAGS, ...customTags.filter(t => !DEFAULT_TAGS.includes(t))];
            localStorage.setItem(LS_KEY_CUSTOM_TAGS, JSON.stringify(customTags));
        }

        const DEFAULT_IMAGE_DATA = [
            { src: 'https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=800&q=80', title: '迷霧森林', date: '2024-06-01', tag: '🌄 風景' },
            { src: 'https://images.unsplash.com/photo-1511884642898-4c92249e20b6?auto=format&fit=crop&w=800&q=80', title: '晨光山嶺', date: '2024-07-15', tag: '🌄 風景' },
            { src: 'https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?auto=format&fit=crop&w=800&q=80', title: '野花盛放', date: '2024-05-22', tag: '🌄 風景' },
            { src: 'https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?auto=format&fit=crop&w=800&q=80', title: '雪峰倒影', date: '2024-01-10', tag: '✈️ 旅行' },
            { src: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=800&q=80', title: '高原暮色', date: '2024-08-03', tag: '🌄 風景' },
            { src: 'https://images.unsplash.com/photo-1420593248178-d88870618ca0?auto=format&fit=crop&w=800&q=80', title: '飛鳥掠天', date: '2024-09-17', tag: '🌄 風景' },
            { src: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80', title: '海天一色', date: '2024-11-05', tag: '✈️ 旅行' },
            { src: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=800&q=80', title: '峻嶺雲海', date: '2024-12-25', tag: '🌄 風景' },
        ];


        // ================================================================
        //  DOM
        // ================================================================
        const scene = document.getElementById('scene');
        const carousel = document.getElementById('carousel');
        const fileInput = document.getElementById('file-upload');
        const autoRotateBtn = document.getElementById('auto-rotate-btn');
        const rotateIcon = document.getElementById('rotate-icon');
        const rotateLabel = document.getElementById('rotate-label');
        const clearStorageBtn = document.getElementById('clear-storage-btn');
        const storageBanner = document.getElementById('storage-banner');
        const tagBar = document.getElementById('tag-bar');
        const tagModal = document.getElementById('tag-modal');
        const tagOptions = document.getElementById('tag-options');
        const tagConfirmBtn = document.getElementById('tag-confirm-btn');
        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lb-img');
        const lbTitle = document.getElementById('lb-title');
        const lbDate = document.getElementById('lb-date');
        const lbTagEl = document.getElementById('lb-tag');
        const lbCounter = document.getElementById('lb-counter');
        const lbClose = document.getElementById('lb-close');
        const lbPrev = document.getElementById('lb-prev');
        const lbNext = document.getElementById('lb-next');
        // Firebase UI
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userAvatar = document.getElementById('user-avatar');
        const cloudSyncBtn = document.getElementById('cloud-sync-btn');
        const cloudRestoreBtn = document.getElementById('cloud-restore-btn');
        const thumbToggleBtn = document.getElementById('thumb-toggle-btn');
        const thumbStrip = document.getElementById('thumb-strip');
        // 功能E/H/I 新元素
        const editModeBtn = document.getElementById('edit-mode-btn');
        const bulkBar = document.getElementById('bulk-bar');
        const bulkCountLabel = document.getElementById('bulk-count-label');
        const bulkSelectAll = document.getElementById('bulk-select-all');
        const bulkDeleteBtn = document.getElementById('bulk-delete-btn');
        const bulkCancelBtn = document.getElementById('bulk-cancel-btn');
        const tagManageBtn = document.getElementById('tag-manage-btn');
        const tagManageModal = document.getElementById('tag-manage-modal');
        const tagManageList = document.getElementById('tag-manage-list');
        const tagNewInput = document.getElementById('tag-new-input');
        const tagAddBtn = document.getElementById('tag-add-btn');
        const tagManageClose = document.getElementById('tag-manage-close');
        // 功能U: 版型抽屜
        const layoutDrawer = document.getElementById('layout-drawer');
        const layoutToggleBtn = document.getElementById('layout-toggle-btn');
        const layoutPanelBtn = document.getElementById('layout-panel-btn');
        const lvWidth = document.getElementById('lv-width');
        const lvHeight = document.getElementById('lv-height');
        const lvPersp = document.getElementById('lv-persp');
        const lvWidthVal = document.getElementById('lv-width-val');
        const lvHeightVal = document.getElementById('lv-height-val');
        const lvPerspVal = document.getElementById('lv-persp-val');
        const lvReset = document.getElementById('lv-reset');
        // 功能Y: 公開分享 / 唯讀
        const shareBar = document.getElementById('share-bar');
        const shareOwnerName = document.getElementById('share-owner-name');
        const shareCopyBtn = document.getElementById('share-copy-btn');
        const shareLinkBtn = document.getElementById('share-link-btn');


        // ================================================================
        //  狀態
        // ================================================================
        let allImageData = [];
        let filteredData = [];
        let activeTag = '全部';
        let currentRotationY = 0, currentRotationX = 0;
        let isDragging = false;
        let startX = 0, startY = 0, prevX = 0, prevY = 0;
        let velocityX = 0, velocityY = 0;
        let animationFrameId;
        let perspective = 1200;
        let isAutoRotating = true;
        let autoRotateRafId = null;        // 自動旋轉專用 RAF ID
        let autoRotateSpeed = 0.25;        // 現在旋轉速度（動態，正就=右，負就=左）
        const AUTO_ROTATE_BASE = 0.25;     // 基準旋轉速度（手勢結束後緊慢回歸至此値）
        let numImages = 0, theta = 0, perRowGlobal = 1;
        let galleryCards = []; // 快取已建立的卡片，供深度暗化使用
        let lbCurrentIndex = 0, lbOpen = false;

        // 上傳暫存（等待 Modal 確認）
        let pendingUploadFiles = [];
        let selectedUploadTag = '🎨 其他';

        // Firebase 使用者
        let currentUser = null;
        // 功能E: 編輯模式
        let editMode = false;
        let dragSrcIndex = null;
        // 功能H: 批次選取
        let selectMode = false;
        const selectedIndices = new Set();
        let longPressTimer = null;

        // 功能U: 版型設定狀態（從 localStorage 還原）
        const DEFAULT_LAYOUT = { w: 260, h: 380, persp: 1200 };
        let layoutCfg = { ...DEFAULT_LAYOUT, ...JSON.parse(localStorage.getItem(LS_KEY_LAYOUT) || '{}') };

        // ================================================================
        //  功能U：版型設定抽屜
        // ================================================================
        function applyLayoutCfg(rebuildGallery = false) {
            // 更新 CSS 變數動態設定卡片尺寸
            document.documentElement.style.setProperty('--card-w', layoutCfg.w + 'px');
            document.documentElement.style.setProperty('--card-h', layoutCfg.h + 'px');
            perspective = layoutCfg.persp;
            scene.style.perspective = perspective + 'px';
            lvWidth.value = layoutCfg.w; lvWidthVal.textContent = layoutCfg.w + 'px';
            lvHeight.value = layoutCfg.h; lvHeightVal.textContent = layoutCfg.h + 'px';
            lvPersp.value = layoutCfg.persp; lvPerspVal.textContent = layoutCfg.persp + 'px';
            if (rebuildGallery) { buildGallery(); if (isAutoRotating) startAutoRotate(); }
            localStorage.setItem(LS_KEY_LAYOUT, JSON.stringify(layoutCfg));
        }

        [layoutToggleBtn, layoutPanelBtn].forEach(btn => btn && btn.addEventListener('click', () => {
            layoutDrawer.classList.toggle('open');
        }));

        lvWidth.addEventListener('input', () => {
            layoutCfg.w = +lvWidth.value;
            lvWidthVal.textContent = layoutCfg.w + 'px';
            document.documentElement.style.setProperty('--card-w', layoutCfg.w + 'px');
            buildGallery(); if (isAutoRotating) startAutoRotate();
            localStorage.setItem(LS_KEY_LAYOUT, JSON.stringify(layoutCfg));
            saveLayoutToCloud();
        });
        lvHeight.addEventListener('input', () => {
            layoutCfg.h = +lvHeight.value;
            lvHeightVal.textContent = layoutCfg.h + 'px';
            document.documentElement.style.setProperty('--card-h', layoutCfg.h + 'px');
            buildGallery(); if (isAutoRotating) startAutoRotate();
            localStorage.setItem(LS_KEY_LAYOUT, JSON.stringify(layoutCfg));
            saveLayoutToCloud();
        });
        lvPersp.addEventListener('input', () => {
            layoutCfg.persp = +lvPersp.value;
            lvPerspVal.textContent = layoutCfg.persp + 'px';
            perspective = layoutCfg.persp;
            scene.style.perspective = perspective + 'px';
            localStorage.setItem(LS_KEY_LAYOUT, JSON.stringify(layoutCfg));
            saveLayoutToCloud();
        });

        lvReset.addEventListener('click', () => {
            layoutCfg = { ...DEFAULT_LAYOUT };
            localStorage.removeItem(LS_KEY_LAYOUT);
            applyLayoutCfg(true); // true = 需要重建畫廊
            saveLayoutToCloud();
            showBanner('↺ 版型已還原預設', false);
            // 同步靈敏度滑桿顯示
            lvDrag.value = 1.0; lvDragVal.textContent = '1.0x';
            lvTouch.value = 1.0; lvTouchVal.textContent = '1.0x';
            lvKey.value = 1; lvKeyVal.textContent = '1排';
        });

        // ── AU: 情境預設按鈕 ─────────────────────────────────────────
        const SCENE_PRESETS = {
            standard: { w: 260, h: 380, persp: 1200 },
            immersive: { w: 420, h: 600, persp: 750 },
            compact: { w: 180, h: 260, persp: 1600 },
            gallery: { w: 320, h: 480, persp: 900 },
            wide: { w: 540, h: 305, persp: 1400 },
        };
        const presetLabels = {
            standard: '🎠 標準', immersive: '🎥 沈浸',
            compact: '🗂 精選', gallery: '🖼 藝廊', wide: '📸 橫幅'
        };

        document.querySelectorAll('.scene-preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const p = SCENE_PRESETS[btn.dataset.preset];
                if (!p) return;
                layoutCfg.w = p.w; layoutCfg.h = p.h; layoutCfg.persp = p.persp;
                // 同步三個滑桿
                lvWidth.value = p.w; lvWidthVal.textContent = p.w + 'px';
                lvHeight.value = p.h; lvHeightVal.textContent = p.h + 'px';
                lvPersp.value = p.persp; lvPerspVal.textContent = p.persp + 'px';
                applyLayoutCfg(true);
                saveLayoutToCloud();
                // 高亮選中預設
                document.querySelectorAll('.scene-preset-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                showBanner(`${presetLabels[btn.dataset.preset]} 情境已套用`, false);
            });
        });

        // ── AS: 靈敏度滑桿 ────────────────────────────────────────────
        const lvDrag = document.getElementById('lv-drag');
        const lvTouch = document.getElementById('lv-touch');
        const lvKey = document.getElementById('lv-key');
        const lvDragVal = document.getElementById('lv-drag-val');
        const lvTouchVal = document.getElementById('lv-touch-val');
        const lvKeyVal = document.getElementById('lv-key-val');

        if (lvDrag) {
            lvDrag.addEventListener('input', () => {
                layoutCfg.dragSens = parseFloat(lvDrag.value);
                lvDragVal.textContent = parseFloat(lvDrag.value).toFixed(1) + 'x';
            });
        }
        if (lvTouch) {
            lvTouch.addEventListener('input', () => {
                layoutCfg.touchSens = parseFloat(lvTouch.value);
                lvTouchVal.textContent = parseFloat(lvTouch.value).toFixed(1) + 'x';
            });
        }
        if (lvKey) {
            lvKey.addEventListener('input', () => {
                layoutCfg.keySens = parseInt(lvKey.value);
                lvKeyVal.textContent = lvKey.value + '排';
            });
        }

        // ── AZ: 光源角度滑桌 ──────────────────────────────────────────
        const lvLight = document.getElementById('lv-light');
        const lvLightVal = document.getElementById('lv-light-val');
        if (lvLight) {
            lvLight.value = layoutCfg.lightAngle || 0;
            lvLightVal.textContent = (layoutCfg.lightAngle || 0) + '°';
            lvLight.addEventListener('input', () => {
                layoutCfg.lightAngle = parseInt(lvLight.value);
                lvLightVal.textContent = lvLight.value + '°';
                applyTransform();
                saveLayoutToCloud();
            });
        }

        // ── BA: 快速跳至指定卡片 ──────────────────────────────────
        const lvJumpRow = document.getElementById('lv-jump-row');
        const lvJumpInput = document.getElementById('lv-jump-input');
        const lvJumpBtn = document.getElementById('lv-jump-btn');
        function jumpToCard(n) {
            const idx = Math.max(0, Math.min(filteredData.length - 1, n - 1));
            const step = theta || 45;
            currentRotationY = -idx * step;
            carousel.style.transition = 'transform 0.5s cubic-bezier(.2,.8,.2,1)';
            applyTransform();
            updateThumbActive(idx);
            setTimeout(() => { carousel.style.transition = ''; }, 550);
            showBanner(`🎯 跳至第 ${idx + 1} 張`, false);
        }
        if (lvJumpBtn) {
            lvJumpBtn.addEventListener('click', () => {
                const v = parseInt(lvJumpInput.value);
                if (!isNaN(v)) jumpToCard(v);
            });
        }
        if (lvJumpInput) {
            lvJumpInput.addEventListener('keydown', e => {
                if (e.key === 'Enter') { const v = parseInt(lvJumpInput.value); if (!isNaN(v)) jumpToCard(v); }
            });
        }
        // Ctrl+G 快速開啟版型抽屎且跳至輸入框
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'g') {
                e.preventDefault();
                layoutDrawer.classList.add('open');
                setTimeout(() => lvJumpInput && lvJumpInput.focus(), 100);
            }
        });

        // ── 版型設定自動儲存到雲端(防抖 1.5s)，方案B ───────────────
        let _saveLayoutTimer = null;
        function saveLayoutToCloud() {
            const fb = window._fb;
            const user = fb && fb.auth ? fb.auth.currentUser : null;
            if (!fb || !user) return;
            clearTimeout(_saveLayoutTimer);
            _saveLayoutTimer = setTimeout(async () => {
                try {
                    await fb.setDoc(
                        fb.doc(fb.db, `users/${user.uid}/profile/info`),
                        {
                            layout: {
                                w: layoutCfg.w,
                                h: layoutCfg.h,
                                persp: layoutCfg.persp,
                                speed: autoRotateSpeed,
                                dragSens: layoutCfg.dragSens || 1.0,
                                touchSens: layoutCfg.touchSens || 1.0,
                                keySens: layoutCfg.keySens || 1,
                                lightAngle: layoutCfg.lightAngle || 0
                            },
                            updatedAt: Date.now()
                        },
                        { merge: true }
                    );
                } catch (e) { /* 雲端儲存失敗，非致命性錯誤，忽略 */ }
            }, 1500);
        }
        // ────────────────────────────────────────────────────────────

        // 點擊抽屜外部關閉
        document.addEventListener('pointerdown', (e) => {
            if (layoutDrawer.classList.contains('open') &&
                !layoutDrawer.contains(e.target) &&
                e.target !== layoutPanelBtn) {
                layoutDrawer.classList.remove('open');
            }
        });

        // 初始化版型
        applyLayoutCfg();

        // ================================================================
        //  功能Y：公開分享連結 / 唯讀模式
        // ================================================================
        (function initReadonlyMode() {
            const params = new URLSearchParams(location.search);
            const viewUid = params.get('view');
            const viewTag = params.get('tag');

            if (!viewUid) return; // 正常模式，跳過

            // ── 設定全域旗標：readonly 模式下封鎖所有干擾路徑 ──
            window.isReadonlyMode = true;

            document.body.classList.add('readonly-mode');
            shareBar.classList.add('visible');
            shareOwnerName.textContent = '相簿載入中…';

            // 過濾標籤
            if (viewTag) activeTag = decodeURIComponent(viewTag);

            // 防重入旗標 + retry 次數限制（避免手機網路不穩時無限重試）
            let _sharedAlbumLoading = false;
            let _sharedAlbumRetryCount = 0;
            const MAX_RETRY = 20; // 最多等 20×300ms = 6 秒

            // 功能AA：使用新版 _fb API 讀取公開相簿
            const tryLoadSharedAlbum = () => {
                // 防重入：若已在讀取中，直接忽略本次呼叫
                if (_sharedAlbumLoading) return;

                const fb = window._fb;
                if (!fb) {
                    if (++_sharedAlbumRetryCount > MAX_RETRY) {
                        shareOwnerName.textContent = '載入逾時';
                        showBanner('⚠️ 網路連線逾時，請重新整理頁面', true);
                        return;
                    }
                    setTimeout(tryLoadSharedAlbum, 300);
                    return;
                }

                _sharedAlbumLoading = true; // 鎖定，防止並發呼叫

                // 讀取 profile（確認 isPublic & 取得顯示名稱）
                fb.getDoc(fb.doc(fb.db, `users/${viewUid}/profile/info`))
                    .then(doc => {
                        const data = doc.exists() ? doc.data() : {};
                        shareOwnerName.textContent = (data.displayName || '使用者') + ' 的相簿';

                        // ── 套用分享者的版型設定（方案B）─────────────────────
                        if (data.layout) {
                            const lv = data.layout;
                            if (lv.w) { layoutCfg.w = lv.w; document.documentElement.style.setProperty('--card-w', lv.w + 'px'); }
                            if (lv.h) { layoutCfg.h = lv.h; document.documentElement.style.setProperty('--card-h', lv.h + 'px'); }
                            if (lv.persp) { layoutCfg.persp = lv.persp; perspective = lv.persp; scene.style.perspective = lv.persp + 'px'; }
                            if (lv.speed !== undefined) autoRotateSpeed = lv.speed;
                        }
                        // ────────────────────────────────────────────────────────────

                        // 若未公開，顯示提示並結束
                        if (!data.isPublic) {
                            carousel.innerHTML = '<p style="color:rgba(255,255,255,.45);font-size:.9rem;text-align:center;margin-top:160px;">🔒 此相簿尚未公開</p>';
                            return;
                        }

                        // 已公開：載入圖片
                        return fb.getDocs(fb.query(
                            fb.collection(fb.db, `users/${viewUid}/images`),
                            fb.orderBy('order')
                        ));
                    })
                    .then(snap => {
                        if (!snap) return; // isPublic = false 已提前 return
                        allImageData = snap.docs.map(d => ({
                            src: d.data().url,
                            title: d.data().title,
                            date: d.data().date,
                            tag: d.data().tag,
                            camera: d.data().camera || '',
                        }));
                        filteredData = activeTag === '全部' ? [...allImageData]
                            : allImageData.filter(d => d.tag === activeTag);
                        buildTagBar(); buildGallery();
                    })
                    .catch(err => {
                        console.warn('載入公開相簿失敗', err);
                        shareOwnerName.textContent = '公開相簿';
                        showBanner('⚠️ 無法載入公開相簿', true);
                        // 失敗後解鎖，允許使用者手動重試（但不自動重試）
                        _sharedAlbumLoading = false;
                    });
            };
            // 等待 DOM 與 Firebase 模組穩定後再讀取（手機端略長）
            setTimeout(tryLoadSharedAlbum, 600);
        })();

        // 分享按鈕：產生公開連結並複製到剪貼簿
        // QR Code Modal 邏輯
        const qrModal = document.getElementById('qr-modal');
        const qrWrap = document.getElementById('qr-canvas-wrap');
        const qrUrlInput = document.getElementById('qr-url-input');
        const qrCopyBtn = document.getElementById('qr-copy-btn');
        const qrCloseBtn = document.getElementById('qr-close-btn');
        let _qrInstance = null;

        function openQrModal(url) {
            qrUrlInput.value = url;

            // 清除舊 QR Code
            qrWrap.innerHTML = '';
            _qrInstance = null;

            try {
                _qrInstance = new QRCode(qrWrap, {
                    text: url,
                    width: 200,
                    height: 200,
                    colorDark: '#1a1a2e',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });
            } catch (e) {
                // fallback：用 Google Charts API
                const img = document.createElement('img');
                img.src = `https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=${encodeURIComponent(url)}&choe=UTF-8`;
                img.width = 200; img.height = 200;
                qrWrap.appendChild(img);
            }

            qrModal.classList.add('show');
        }

        qrCloseBtn.addEventListener('click', () => qrModal.classList.remove('show'));
        qrModal.addEventListener('click', (e) => { if (e.target === qrModal) qrModal.classList.remove('show'); });

        qrCopyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(qrUrlInput.value).then(() => {
                qrCopyBtn.textContent = '✅ 已複製！';
                setTimeout(() => qrCopyBtn.textContent = '📋 複製', 1800);
            });
        });

        shareLinkBtn.addEventListener('click', () => {
            if (!currentUser) {
                showBanner('⚠️ 請先登入才能分享', true); return;
            }
            const tag = activeTag !== '全部' ? `&tag=${encodeURIComponent(activeTag)}` : '';
            const url = `${location.origin}${location.pathname}?view=${currentUser.uid}${tag}`;
            openQrModal(url);
        });

        // ================================================================
        //  功能G: 圖片壓縮前處理
        // ================================================================
        async function compressImage(file, maxWidth = 1200, quality = 0.85) {
            try {
                const img = await createImageBitmap(file);
                const ratio = Math.min(maxWidth / img.width, 1);
                const canvas = document.createElement('canvas');
                canvas.width = Math.round(img.width * ratio);
                canvas.height = Math.round(img.height * ratio);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                return new Promise((res, rej) => canvas.toBlob(b => b ? res(b) : rej(), 'image/webp', quality));
            } catch { return file; } // 失敗就用原檔
        }
        function blobToDataURL(blob) {
            return new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(blob); });
        }

        // ================================================================
        //  圖片上傳（改為先選標籤）
        // ================================================================
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            if (!files.length) return;

            e.target.value = '';
        });

        async function processUpload(files, tag) {
            stopAutoRotate();
            allImageData = [];

            // ── 功能AE：顯示進度條 ──────────────────────
            const upBar = document.getElementById('upload-progress-bar');
            const upFill = document.getElementById('upload-progress-fill');
            const upLabel = document.getElementById('upload-progress-label');
            const upCount = document.getElementById('upload-progress-count');
            const total = files.length;

            upFill.style.width = '0%';
            upLabel.textContent = '準備載入 EXIF 解析器…';
            upCount.textContent = `0 / ${total}`;
            upBar.style.display = 'flex';
            // ────────────────────────────────────────────

            // 功能AB：動態載入 exifr（約 8KB ESM，僅第一次需要網路請求）
            let exifrParse = null;
            try {
                const mod = await import('https://esm.sh/exifr@7/dist/lite.esm.js');
                exifrParse = mod.parse;
            } catch { /* 離線時降級，忽略 */ }

            for (let i = 0; i < total; i++) {
                const file = files[i];

                // 功能AE：更新進度
                const pct = Math.round((i / total) * 100);
                upFill.style.width = `${pct}%`;
                upLabel.textContent = `壓縮中：${file.name.replace(/\.[^.]+$/, '')}`;
                upCount.textContent = `${i + 1} / ${total}`;

                const compressed = await compressImage(file);
                const src = await blobToDataURL(compressed);

                // 功能AB：解析 EXIF
                let date = new Date(file.lastModified).toLocaleDateString('zh-TW');
                let camera = '';
                if (exifrParse) {
                    try {
                        const exif = await exifrParse(file, {
                            pick: ['DateTimeOriginal', 'Make', 'Model']
                        });
                        if (exif?.DateTimeOriginal) {
                            date = new Date(exif.DateTimeOriginal).toLocaleDateString('zh-TW');
                        }
                        camera = [exif?.Make, exif?.Model].filter(Boolean).join(' ').trim();
                    } catch { /* 無 EXIF，降級 */ }
                }

                allImageData.push({ src, title: file.name.replace(/\.[^.]+$/, ''), date, tag, camera });
            }

            // 功能AE：完成動畫
            upFill.style.width = '100%';
            upLabel.textContent = `✅ ${total} 張處理完成！`;
            upCount.textContent = '';
            setTimeout(() => { upBar.style.display = 'none'; }, 1800);

            activeTag = '全部';
            filteredData = [...allImageData];
            buildTagBar(); buildGallery();
            saveToLocalStorage();
            if (isAutoRotating) startAutoRotate();
            showBanner(`✅ 已載入 ${total} 張（WebP 壓縮）`, false);
        }

        // ================================================================
        //  建立畫庫（使用 filteredData）
        // ================================================================

        // IntersectionObserver 全域唱例（每次 buildGallery 重建時重置）
        let _lazyImgObserver = null;

        function _setupLazyObserver() {
            if (_lazyImgObserver) _lazyImgObserver.disconnect();
            _lazyImgObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (!entry.isIntersecting) return;
                    const img = entry.target;
                    const src = img.dataset.src;
                    if (!src) return;
                    img.removeAttribute('data-src');
                    // 載入完成後才淡入（同樣防黑框）
                    img.addEventListener('load', () => img.classList.add('img-loaded'), { once: true });
                    img.addEventListener('error', () => img.classList.add('img-loaded'), { once: true });
                    img.src = src;
                    _lazyImgObserver.unobserve(img);
                });
            }, {
                // rootMargin: 視域外 300px 即開始載入，避免旋転卡片的白畫麻
                rootMargin: '300px 300px 300px 300px',
                threshold: 0
            });
        }

        function _observeLazyImgs() {
            if (!_lazyImgObserver) return;
            carousel.querySelectorAll('img[data-src]').forEach(img => {
                _lazyImgObserver.observe(img);
            });
        }

        function buildGallery() {
            // 重建前 disconnect 舊 Observer，防記憶體漏涌
            if (_lazyImgObserver) _lazyImgObserver.disconnect();

            carousel.innerHTML = '';
            numImages = filteredData.length;
            if (!numImages) {
                carousel.innerHTML = '<p style="color:rgba(255,255,255,.3);font-size:.8rem;text-align:center;margin-top:140px;">此分類暫無圖片</p>';
                return;
            }

            const cardW = parseFloat(
                getComputedStyle(document.documentElement).getPropertyValue('--card-w')
            ) || 260;
            const GAP = 24;
            const ROW_GAP = 30;

            const MAX_R = Math.min(perspective * 0.72, 3600);
            const maxPerRow = numImages <= 1
                ? 1
                : Math.max(3, Math.floor(2 * Math.PI * MAX_R / (cardW + GAP)));
            const perRow = Math.min(numImages, maxPerRow);
            const rowCount = Math.ceil(numImages / perRow);

            // 分批參數：前 N 張同步建構（首屏可見），其餘分批補建
            const FIRST_BATCH = Math.min(numImages, 12);
            const CHUNK_SIZE = 8;

            // 建立單張卡片 DOM 的工廠函數
            function buildCard(i, useLazy) {
                const data = filteredData[i];
                const item = document.createElement('div');
                item.className = 'carousel-item';

                const inner = document.createElement('div');
                inner.className = 'carousel-item-inner';
                inner.classList.add('entering-wave');
                inner.style.animationDelay = `${Math.min(i, FIRST_BATCH - 1) * 0.05}s`;

                const front = document.createElement('div');
                front.className = 'card-front';

                const wrap = document.createElement('div');
                wrap.className = 'img-wrap';

                const img = document.createElement('img');
                img.alt = data.title || `圖片 ${i + 1}`;

                // 圖片載入完成才淡入（防止 onload 前顯示黑色空框）
                const _onImgLoad = () => img.classList.add('img-loaded');
                img.addEventListener('load', _onImgLoad, { once: true });
                img.addEventListener('error', () => {
                    img.onerror = null;
                    img.src = `https://picsum.photos/seed/${i}/800/1200`;
                    // fallback 也算載入，動作由 load 事件觸發 img-loaded
                }, { once: true });

                if (useLazy) {
                    // 懶加載： Observer 轉入視域後才設 src
                    img.dataset.src = data.src;
                } else {
                    // 首屏第一批：直接載入，前 3 張提升優先度
                    if (i < 3) img.fetchPriority = 'high';
                    img.src = data.src;
                }

                const caption = document.createElement('div');
                caption.className = 'caption';
                caption.innerHTML = `<p class="caption-title">${data.title || `圖片 ${i + 1}`}</p>
                             <p class="caption-date">${data.date || ''} · ${data.tag || ''}</p>`;

                const hint = document.createElement('div');
                hint.className = 'click-hint'; hint.textContent = '🔍';

                const flipBtn = document.createElement('button');
                flipBtn.className = 'flip-btn'; flipBtn.title = '查看詳情';
                flipBtn.textContent = '🔄';
                flipBtn.addEventListener('pointerdown', e => { e.stopPropagation(); e.stopImmediatePropagation(); });
                flipBtn.addEventListener('click', e => {
                    e.stopPropagation(); e.stopImmediatePropagation();
                    item.classList.toggle('flipped');
                    updateThumbActive(i);
                });

                // 功能E: 編輯模式 — 刪除按鈕 + 拖曳
                if (editMode) {
                    item.classList.add('edit-mode-active');
                    item.setAttribute('draggable', 'true');

                    const delBtn = document.createElement('button');
                    delBtn.className = 'card-delete-btn';
                    delBtn.title = '刪除此張';
                    delBtn.textContent = '×';
                    delBtn.addEventListener('mousedown', e => e.stopPropagation());
                    delBtn.addEventListener('click', e => {
                        e.stopPropagation();
                        const realIdx = allImageData.indexOf(filteredData[i]);
                        if (realIdx >= 0) { allImageData.splice(realIdx, 1); }
                        filteredData = activeTag === '全部' ? [...allImageData] : allImageData.filter(d => d.tag === activeTag);
                        saveToLocalStorage();
                        buildGallery();
                        showBanner('🗑 已刪除', false);
                    });
                    item.appendChild(delBtn);

                    item.addEventListener('dragstart', () => { dragSrcIndex = i; item.style.opacity = '.4'; });
                    item.addEventListener('dragend', () => { item.style.opacity = ''; });
                    item.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('drag-over'); });
                    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
                    item.addEventListener('drop', e => {
                        e.preventDefault(); item.classList.remove('drag-over');
                        if (dragSrcIndex === null || dragSrcIndex === i) return;
                        const srcReal = allImageData.indexOf(filteredData[dragSrcIndex]);
                        const dstReal = allImageData.indexOf(filteredData[i]);
                        if (srcReal < 0 || dstReal < 0) return;
                        [allImageData[srcReal], allImageData[dstReal]] = [allImageData[dstReal], allImageData[srcReal]];
                        filteredData = activeTag === '全部' ? [...allImageData] : allImageData.filter(d => d.tag === activeTag);
                        saveToLocalStorage(); buildGallery();
                        dragSrcIndex = null;
                    });
                }

                // 功能H: 批次選取 — 長按進入選取模式
                if (selectMode && selectedIndices.has(i)) item.classList.add('bulk-selected');
                item.addEventListener('pointerdown', () => {
                    if (editMode) return;
                    longPressTimer = setTimeout(() => {
                        if (!selectMode) {
                            selectMode = true;
                            selectedIndices.add(i);
                            buildGallery();
                        }
                        bulkBar.classList.add('show');
                        updateBulkCount();
                        if (isAutoRotating) stopAutoRotate();
                    }, 500);
                });
                item.addEventListener('pointerup', () => clearTimeout(longPressTimer));
                item.addEventListener('pointercancel', () => clearTimeout(longPressTimer));
                if (selectMode) {
                    item.addEventListener('click', e => {
                        e.stopPropagation();
                        if (selectedIndices.has(i)) selectedIndices.delete(i);
                        else selectedIndices.add(i);
                        item.classList.toggle('bulk-selected', selectedIndices.has(i));
                        updateBulkCount();
                    });
                }

                wrap.appendChild(img); wrap.appendChild(caption); wrap.appendChild(hint);
                front.appendChild(wrap); front.appendChild(flipBtn);

                // 背面
                const back = document.createElement('div');
                back.className = 'card-back';
                const tagIcon = data.tag ? data.tag.split(' ')[0] : '🖼️';
                back.innerHTML = `
                    <div class="back-icon">${tagIcon}</div>
                    <h3 class="back-title">${data.title || `圖片 ${i + 1}`}</h3>
                    <p class="back-date">${data.date || '—'}</p>
                    ${data.tag ? `<div class="back-tag-badge">${data.tag}</div>` : ''}
                    ${data.camera ? `<div class="camera-badge">📷 ${data.camera}</div>` : ''}
                `;
                const backFlipBtn = document.createElement('button');
                backFlipBtn.className = 'back-flip-btn'; backFlipBtn.title = '翻回';
                backFlipBtn.textContent = '↩️';
                backFlipBtn.addEventListener('mousedown', e => e.stopPropagation());
                backFlipBtn.addEventListener('click', e => { e.stopPropagation(); item.classList.remove('flipped'); });
                back.appendChild(backFlipBtn);

                inner.appendChild(front); inner.appendChild(back);
                item.appendChild(inner);

                // 3D 位置計算
                const row = Math.floor(i / perRow);
                const colInRow = i % perRow;
                const colsInThisRow = (row < rowCount - 1)
                    ? perRow
                    : ((numImages % perRow) || perRow);
                const thetaInRow = 360 / colsInThisRow;
                const rInRow = colsInThisRow <= 1
                    ? 0
                    : Math.round((cardW + GAP) / (2 * Math.sin(Math.PI / colsInThisRow)));
                const yOff = (row - (rowCount - 1) / 2) * (layoutCfg.h + ROW_GAP);
                item.style.transform = `rotateY(${thetaInRow * colInRow}deg) translateZ(${rInRow}px) translateY(${yOff}px)`;
                item.dataset.baseAngle = thetaInRow * colInRow;

                wrap.addEventListener('click', e => {
                    e.stopPropagation();
                    if (!item.classList.contains('flipped')) openLightbox(i);
                });

                return item;
            }

            // ── 第一批：同步建構，環境 img.src 直接載入 ──
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < FIRST_BATCH; i++) {
                fragment.appendChild(buildCard(i, false));
            }
            carousel.appendChild(fragment);

            // 同步更新全域狀態
            theta = 360 / perRow;
            perRowGlobal = perRow;
            galleryCards = Array.from(carousel.querySelectorAll('.carousel-item'));
            buildThumbStrip();

            // ── 剩餘張：用 requestIdleCallback 分批補建，不阻塑主線程 ──
            if (numImages > FIRST_BATCH) {
                _setupLazyObserver();
                // 🔧 LINE WebView 修復：批次建構期間設旗標，讓 handleDragMove 暫停旋轉計算
                window._galleryBuilding = true;

                const scheduleBatch = (startIdx) => {
                    if (startIdx >= numImages) {
                        // 所有建構完成，解除旗標並刷新縮圖
                        window._galleryBuilding = false;
                        buildThumbStrip();
                        return;
                    }
                    const runner = () => {
                        const batchFrag = document.createDocumentFragment();
                        const end = Math.min(startIdx + CHUNK_SIZE, numImages);
                        for (let i = startIdx; i < end; i++) {
                            batchFrag.appendChild(buildCard(i, true));
                        }
                        carousel.appendChild(batchFrag);
                        galleryCards = Array.from(carousel.querySelectorAll('.carousel-item'));
                        _observeLazyImgs();
                        scheduleBatch(end);
                    };
                    if (typeof requestIdleCallback !== 'undefined') {
                        requestIdleCallback(runner, { timeout: 500 });
                    } else {
                        setTimeout(runner, 16);
                    }
                };

                scheduleBatch(FIRST_BATCH);
            } else {
                // 圖片數量 ≤ FIRST_BATCH，直接清除旗標
                window._galleryBuilding = false;
            }
        }

        // ================================================================
        //  功能H: 批次操作列輟助
        // ================================================================
        function updateBulkCount() {
            bulkCountLabel.textContent = `已選 ${selectedIndices.size} 張`;
        }
        function exitSelectMode() {
            selectMode = false; selectedIndices.clear();
            bulkBar.classList.remove('show');
            buildGallery();
            if (isAutoRotating) startAutoRotate();
        }
        bulkSelectAll.addEventListener('click', () => {
            filteredData.forEach((_, i) => selectedIndices.add(i));
            updateBulkCount(); buildGallery();
        });
        bulkDeleteBtn.addEventListener('click', () => {
            if (!selectedIndices.size) return;
            if (!confirm(`確定刪除選取的 ${selectedIndices.size} 張圖片？`)) return;
            const toRemove = [...selectedIndices].map(i => filteredData[i]);
            allImageData = allImageData.filter(d => !toRemove.includes(d));
            saveToLocalStorage();
            filteredData = activeTag === '全部' ? [...allImageData] : allImageData.filter(d => d.tag === activeTag);
            exitSelectMode();
            buildTagBar();
            showBanner(`🗑 已刪除 ${toRemove.length} 張`, false);
        });
        bulkCancelBtn.addEventListener('click', exitSelectMode);

        // ================================================================
        //  🎥 沉浸模式切換
        // ================================================================
        const immersiveBtn = document.getElementById('immersive-btn');
        let isImmersive = false;
        // 沉浸模式的預設參數
        const IMMERSIVE_PRESET = { w: 420, h: 600, persp: 750 };
        // 記錄進入沉浸前的版型設定
        let preImmersiveLayout = null;

        function enterImmersiveMode() {
            preImmersiveLayout = { ...layoutCfg }; // 備份目前設定
            // 套用沉浸參數
            layoutCfg.w = IMMERSIVE_PRESET.w;
            layoutCfg.h = IMMERSIVE_PRESET.h;
            layoutCfg.persp = IMMERSIVE_PRESET.persp;
            // 加入平滑過渡
            document.documentElement.style.setProperty('--card-w', layoutCfg.w + 'px');
            document.documentElement.style.setProperty('--card-h', layoutCfg.h + 'px');
            perspective = layoutCfg.persp;
            scene.style.perspective = perspective + 'px';
            // 場景加入過渡動畫
            carousel.style.transition = 'transform 0.6s cubic-bezier(.2,.8,.2,1)';
            buildGallery();
            if (isAutoRotating) startAutoRotate();
            isImmersive = true;
            immersiveBtn.textContent = '⏏️ 退出';
            immersiveBtn.classList.add('active');
            showBanner('🎥 沉浸模式 — 大螢幕沉浸體驗', false);
        }

        function exitImmersiveMode() {
            layoutCfg = { ...preImmersiveLayout }; // 還原備份設定
            document.documentElement.style.setProperty('--card-w', layoutCfg.w + 'px');
            document.documentElement.style.setProperty('--card-h', layoutCfg.h + 'px');
            perspective = layoutCfg.persp;
            scene.style.perspective = perspective + 'px';
            buildGallery();
            if (isAutoRotating) startAutoRotate();
            isImmersive = false;
            immersiveBtn.textContent = '🎥 沉浸';
            immersiveBtn.classList.remove('active');
            showBanner('↩ 已退出沉浸模式', false);
        }

        immersiveBtn.addEventListener('click', () => {
            if (isImmersive) exitImmersiveMode();
            else enterImmersiveMode();
        });

        // ================================================================
        //  功能E: 編輯模式切換
        // ================================================================
        editModeBtn.addEventListener('click', () => {
            if (selectMode) return; // 批次模式下不變更
            editMode = !editMode;
            editModeBtn.textContent = editMode ? '✅ 完成' : '✏️ 編輯';
            editModeBtn.style.background = editMode ? 'rgba(251,191,36,.25)' : '';
            buildGallery();

        tagManageClose.addEventListener('click', () => tagManageModal.classList.remove('open'));
        tagManageModal.addEventListener('click', e => { if (e.target === tagManageModal) tagManageModal.classList.remove('open'); });

        // ================================================================
        //  旋轉 & 慣性
        // ================================================================
        // ===== 功能A：視差偏移變數 =====
        let parallaxX = 0, parallaxY = 0;

        function applyTransform() {
            currentRotationX = Math.max(-40, Math.min(40, currentRotationX));
            const pX = isDragging ? 0 : parallaxX;
            const pY = isDragging ? 0 : parallaxY;
            carousel.style.transform = `rotateY(${currentRotationY + pY}deg) rotateX(${currentRotationX + pX}deg)`;

            // ── AT 深度暗化 + 陰影動畫：依各卡片面向角動態調整亮度和陰影 ──
            // AZ: lightAngle 光源角度偏移（0=正前方光，90=右側光）
            const lightOff = layoutCfg.lightAngle || 0;
            let frontCardEl = null; let frontBright = -1;
            galleryCards.forEach(card => {
                const base = parseFloat(card.dataset.baseAngle || 0);
                const eff = (((base + currentRotationY + lightOff) % 360) + 360) % 360;
                const rad = eff * Math.PI / 180;
                const bright = 0.3 + 0.7 * ((Math.cos(rad) + 1) / 2);
                // AT: 動態陰影（前排陰影深，後排幾乎無陰影）
                const shadowBlur = Math.round(bright * 28);
                const shadowAlpha = (bright * 0.55).toFixed(2);
                card.style.filter = `brightness(${bright.toFixed(2)})`;
                card.style.boxShadow = `0 ${shadowBlur}px ${shadowBlur * 2}px rgba(0,0,0,${shadowAlpha})`;
                // AY: 找到最亮(最前方)的卡片
                if (bright > frontBright) { frontBright = bright; frontCardEl = card; }
            });
            // AY: 正面高亮 — 只有最前方卡片加 card-focused 類別
            galleryCards.forEach(card => card.classList.toggle('card-focused', card === frontCardEl));
        }
        // AY: 慣性停止後自動 Snap 吸附最近卡片
        function snapToNearest() {
            if (!theta || theta <= 0) return;
            const nearest = Math.round(currentRotationY / theta) * theta;
            carousel.style.transition = 'transform 0.38s cubic-bezier(.2,.8,.2,1)';
            currentRotationY = nearest;
            applyTransform();
            // 吸附完成後移除過渡動畫
            setTimeout(() => { carousel.style.transition = ''; }, 400);
        }

        function applyInertia() {
            if (Math.abs(velocityX) > 0.06 || Math.abs(velocityY) > 0.06) {
                currentRotationY += velocityX; currentRotationX += velocityY;
                applyTransform();
                velocityX *= 0.93; velocityY *= 0.93;
                animationFrameId = requestAnimationFrame(applyInertia);
            } else {
                // AY: 慣性幾乎停止時，自動 Snap 到最近卡片
                snapToNearest();
            }
        }

        // ================================================================
        //  拖曳
        // ================================================================
        function handleDragStart(e) {
            if (lbOpen) return;
            // 🔧 LINE WebView 修復：多指觸控(雙指Pinch)時直接忽略，防止 touches[0] 衝突
            if (e.touches && e.touches.length !== 1) return;
            isDragging = true;
            startX = prevX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
            startY = prevY = e.type.includes('mouse') ? e.pageY : e.touches[0].pageY;
            cancelAnimationFrame(animationFrameId);
            carousel.style.transition = 'none';
        }
        function handleDragMove(e) {
            if (!isDragging || lbOpen || isPinching) return;
            // 🔧 LINE WebView 修復：批次建構期間凍結旋轉計算，避免 DOM mutate + 動畫同時觸發 OOM
            if (window._galleryBuilding) return;
            const isTouch = e.type.includes('touch');
            // 🔧 LINE WebView 修復：多指時直接忽略（Pinch 轉換期保護）
            if (isTouch && e.touches.length !== 1) return;
            // 統一在此 preventDefault，避免瀏覽器 passive 衝突警告
            if (isTouch) e.preventDefault();
            const cx = isTouch ? e.touches[0].pageX : e.pageX;
            const cy = isTouch ? e.touches[0].pageY : e.pageY;
            const sens = isTouch
                ? (layoutCfg.touchSens ?? 1.0)
                : (layoutCfg.dragSens ?? 1.0);
            velocityX = (cx - prevX) * 0.4 * sens;
            velocityY = (cy - prevY) * 0.2 * sens;
            currentRotationY += velocityX; currentRotationX += velocityY;
            applyTransform(); prevX = cx; prevY = cy;
        }
        function handleDragEnd() {
            isDragging = false;
            carousel.style.transition = 'transform 0.1s ease-out';
            applyInertia(); // 慕性满衰到零，自然停住

            // 記憶手勢方向，供下次開啟自動旋轉時使用
            const gestureV = Math.max(-5, Math.min(5, velocityX));
            if (Math.abs(gestureV) > 0.15) {
                // 將手勢速度幅度映射到 autoRotateSpeed，但不自動啟動
                autoRotateSpeed = Math.sign(gestureV) * Math.max(AUTO_ROTATE_BASE,
                    Math.min(1.5, Math.abs(gestureV) * 0.3));
            }
            // ✔ 不再呼叫 startAutoRotate：滑動結束 → 恄性自然停住
        }

        // ================================================================
        //  滾輪縮放
        // ================================================================
        document.addEventListener('wheel', e => {
            if (lbOpen) return;
            e.preventDefault();
            // 展間上限從 3000 → 8000，支援「拉到很遠看全局」
            perspective = Math.max(400, Math.min(8000, perspective + e.deltaY * 1.2));
            scene.style.perspective = perspective + 'px';
            // 記憶滞輪調後的景深到 layoutCfg
            layoutCfg.persp = perspective;
        }, { passive: false });

        // ================================================================
        //  雙指 Pinch 縮放（手機 / 平板端）
        //  支援「往外拉很遠」：perspective 4,000~8,000px
        // ================================================================
        let pinchStartDist = 0;
        let pinchStartPersp = 1200;
        let isPinching = false;
        let _pinchEaseRaf = null; // 緩動動畫 frame

        function getTouchDist(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.hypot(dx, dy);
        }

        document.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                isPinching = true;
                pinchStartDist = getTouchDist(e.touches);
                pinchStartPersp = perspective;
                // 停止緩動動畫，避免跟手變衝突
                if (_pinchEaseRaf) { cancelAnimationFrame(_pinchEaseRaf); _pinchEaseRaf = null; }
                // 阻止雙指觸發單指拖曳
                isDragging = false;
                cancelAnimationFrame(animationFrameId);
            }
        }, { passive: true });

        document.addEventListener('touchmove', e => {
            if (!isPinching || e.touches.length !== 2) return;
            e.preventDefault(); // 阻止瀏覽器預設的頁面縮放
            const dist = getTouchDist(e.touches);
            // 縮小 > 1（往外拉）→ perspective 變大（推遠）
            // 放大 < 1（往內拉）→ perspective 變小（拉近）
            const rawScale = pinchStartDist / dist;
            // 增強感原係數：讓手勢感覺更宬闊
            const SENSITIVITY = 1.6;
            const amplified = 1 + (rawScale - 1) * SENSITIVITY;
            // 展間 8000px，對應「拉到很遠看全局」的需求
            perspective = Math.max(400, Math.min(8000, pinchStartPersp * amplified));
            scene.style.perspective = perspective + 'px';
        }, { passive: false });

        document.addEventListener('touchend', e => {
            if (e.touches.length < 2 && isPinching) {
                isPinching = false;
                // ── Pinch 結束後緩動回彈（若超出小界 400px 或大界 8000px 才回彈） ──
                const target = Math.max(400, Math.min(8000, perspective));
                let current = perspective;

                const ease = () => {
                    current += (target - current) * 0.12;
                    if (Math.abs(current - target) < 0.5) {
                        current = target;
                        scene.style.perspective = current + 'px';
                        perspective = current;
                        // 記憶到 layoutCfg，不重建 gallery
                        layoutCfg.persp = Math.round(current);
                        _pinchEaseRaf = null;
                        return;
                    }
                    scene.style.perspective = current + 'px';
                    _pinchEaseRaf = requestAnimationFrame(ease);
                };
                _pinchEaseRaf = requestAnimationFrame(ease);
            }
        }, { passive: true });


        // ================================================================
        //  鍵盤
        // ================================================================
        document.addEventListener('keydown', e => {
            if (lbOpen) {
                if (e.key === 'ArrowLeft') { e.preventDefault(); lbShowIndex(lbCurrentIndex - 1); }
                if (e.key === 'ArrowRight') { e.preventDefault(); lbShowIndex(lbCurrentIndex + 1); }
                if (e.key === 'Escape') closeLightbox();
                return;
            }
            // AS: 鍵盤步進套用 keySens 倍率（1～5 排）
            const keySens = layoutCfg.keySens || 1;
            const step = (theta || 45) * keySens;
            switch (e.key) {
                case 'ArrowLeft': e.preventDefault(); cancelAnimationFrame(animationFrameId);
                    currentRotationY = Math.round(currentRotationY / (theta || 45)) * (theta || 45) - step;
                    carousel.style.transition = 'transform 0.5s cubic-bezier(.2,.8,.2,1)'; applyTransform(); break;
                case 'ArrowRight': e.preventDefault(); cancelAnimationFrame(animationFrameId);
                    currentRotationY = Math.round(currentRotationY / (theta || 45)) * (theta || 45) + step;
                    carousel.style.transition = 'transform 0.5s cubic-bezier(.2,.8,.2,1)'; applyTransform(); break;
                case 'ArrowUp': e.preventDefault();
                    currentRotationX = Math.max(-40, currentRotationX - 8);
                    carousel.style.transition = 'transform 0.3s ease-out'; applyTransform(); break;
                case 'ArrowDown': e.preventDefault();
                    currentRotationX = Math.min(40, currentRotationX + 8);
                    carousel.style.transition = 'transform 0.3s ease-out'; applyTransform(); break;
            }
        });

        // ================================================================
        //  Lightbox
        // ================================================================
        function openLightbox(idx) {
            lbOpen = true; lbCurrentIndex = idx;

        }
        function closeLightbox() {

        }
        function lbShowIndex(idx) {
            lbCurrentIndex = ((idx % numImages) + numImages) % numImages;

        // ================================================================
        //  自動旋轉（速度由手勢動態決定，可向左或向右）
        // ================================================================
        function startAutoRotate() {
            if (autoRotateRafId) cancelAnimationFrame(autoRotateRafId);

            function _beginTick() {
                function tick() {
                    if (!isDragging && !lbOpen && isAutoRotating) {
                        // 自動旋轉：固定 autoRotateSpeed（正=右，負=左）
                        // 手勢方向由 handleDragEnd 注入，這裡只照用即可
                        currentRotationY += autoRotateSpeed;
                        applyTransform();
                    }
                    if (isAutoRotating) autoRotateRafId = requestAnimationFrame(tick);
                }
                autoRotateRafId = requestAnimationFrame(tick);
            }

            // 🎯 等待正面卡片圖片載入完成才開始旋轉，避免使用者看到黑框轉動
            // 取 galleryCards[0]（旋轉起點最接近正面的那張）的 img
            const frontCard = galleryCards && galleryCards[0];
            const frontImg = frontCard && frontCard.querySelector('img');

            if (frontImg && !frontImg.classList.contains('img-loaded')) {
                // 圖片還沒出來：先等 onload，不啟動旋轉
                frontImg.addEventListener('load', () => {
                    // 再次確認仍開著自動旋轉
                    if (isAutoRotating) _beginTick();
                }, { once: true });
                // 若載入失敗（error）也要啟動，不能讓轉盤永遠停住
                frontImg.addEventListener('error', () => {
                    if (isAutoRotating) _beginTick();
                }, { once: true });
            } else {
                // 圖片已載入（或沒有圖片）：直接啟動
                _beginTick();
            }
        }
        function stopAutoRotate() {
            if (autoRotateRafId) { cancelAnimationFrame(autoRotateRafId); autoRotateRafId = null; }
            // 同時停止慣性
            cancelAnimationFrame(animationFrameId);
            velocityX = 0; velocityY = 0;
        }

        autoRotateBtn.addEventListener('click', () => {
            isAutoRotating = !isAutoRotating;
            rotateIcon.textContent = isAutoRotating ? '⏸' : '▶';
            rotateLabel.textContent = isAutoRotating ? '自動旋轉' : '已暫停';
            autoRotateBtn.classList.toggle('btn-emerald', isAutoRotating);
            autoRotateBtn.classList.toggle('btn-slate', !isAutoRotating);
            isAutoRotating ? startAutoRotate() : stopAutoRotate();
        });

        // 轉速滑桿（放在版型抽屜裏）
        const lvSpeed = document.getElementById('lv-speed');
        const lvSpeedVal = document.getElementById('lv-speed-val');
        if (lvSpeed) {

        // ================================================================
        //  功能三：Firebase 雲端相簿

        // 監聽登入狀態（等待 Firebase 模組初始化）
        function initFirebase() {
            const fb = window._fb;
            if (!fb) { setTimeout(initFirebase, 200); return; }

            const publicToggleBtn = document.getElementById('public-toggle-btn');

            fb.onAuthStateChanged(fb.auth, async user => {
                currentUser = user;
                userAvatar.style.display = user ? 'block' : 'none';
                logoutBtn.style.display = user ? 'inline-block' : 'none';
                cloudSyncBtn.style.display = user ? 'inline-block' : 'none';
                if (cloudRestoreBtn) cloudRestoreBtn.style.display = user ? 'inline-block' : 'none';
                const _delBtn = document.getElementById('delete-all-btn');
                if (_delBtn) _delBtn.style.display = user ? 'inline-block' : 'none';
                loginBtn.style.display = user ? 'none' : 'inline-block';
                // 功能AA：公開按鈕只在登入時顯示
                if (publicToggleBtn) publicToggleBtn.style.display = user ? 'inline-block' : 'none';

                if (user) {
                    userAvatar.src = user.photoURL || '';
                    showBanner(`👋 歡迎 ${user.displayName || '使用者'}`, false);

                    // 分享瀏覽模式（readonly）：跳過 loadFromCloud，避免覆蓋分享相簿資料
                    if (!window.isReadonlyMode) {
                        await loadFromCloud();
                    }

                    // 功能AA：讀取 profile.isPublic 更新按鈕狀態
                    try {
                        const profileDoc = await fb.getDoc(
                            fb.doc(fb.db, `users/${user.uid}/profile/info`)
                        );
                        const isPublic = profileDoc.exists() ? (profileDoc.data().isPublic || false) : false;
                        if (publicToggleBtn) {
                            publicToggleBtn.classList.toggle('is-public', isPublic);
                            publicToggleBtn.textContent = isPublic ? '🌐 公開中' : '🌐 公開';
                        }
                    } catch (e) { /* profile 不存在或讀取失敗，忽略 */ }
                }
            });

            // 功能AA：公開相簿切換
            publicToggleBtn && publicToggleBtn.addEventListener('click', async () => {
                if (!currentUser) { showBanner('⚠️ 請先登入', true); return; }
                const fb = window._fb;
                const isNowPublic = publicToggleBtn.classList.contains('is-public');
                const newState = !isNowPublic;
                try {
                    await fb.setDoc(
                        fb.doc(fb.db, `users/${currentUser.uid}/profile/info`),
                        {
                            isPublic: newState,
                            displayName: currentUser.displayName || '使用者',
                            updatedAt: Date.now()
                        },
                        { merge: true }
                    );
                    publicToggleBtn.classList.toggle('is-public', newState);
                    publicToggleBtn.textContent = newState ? '🌐 公開中' : '🌐 公開';
                    showBanner(newState ? '🌐 相簿已公開！分享連結即可讓任何人瀏覽' : '🔒 相簿已設為非公開', false);
                } catch (e) {

        // ================================================================
        //  一鍵刪除所有照片（本機 + 雲端）

        const deleteAllBtn = document.getElementById('delete-all-btn');
        const deleteConfirmMod = document.getElementById('delete-confirm-modal');
        const delCancelBtn = document.getElementById('del-cancel-btn');
        const delConfirmBtn = document.getElementById('del-confirm-btn');

        // 登入/登出時顯示或隱藏刪除按鈕（在 onAuthStateChanged 中已處理，這裡做備份）
        if (deleteAllBtn) {
            deleteAllBtn.addEventListener('click', () => {
