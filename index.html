        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL, deleteObject, listAll }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';
        import { getFirestore, collection, doc, getDoc, setDoc, getDocs, deleteDoc, query, orderBy }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

        // ★ Firebase 設定由 GitHub Actions inject.py 注入（佔位符，勿填真實值）

            apiKey: "__FIREBASE_API_KEY__",
            authDomain: "__FIREBASE_AUTH_DOMAIN__",
            projectId: "__FIREBASE_PROJECT_ID__",
            storageBucket: "__FIREBASE_STORAGE_BUCKET__",
            messagingSenderId: "__FIREBASE_MESSAGING_SENDER_ID__",
            appId: "__FIREBASE_APP_ID__"
        };


        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 將 Firebase 實例掛到 window 給主邏輯使用
        window._fb = {
            auth, storage, db, storageRef, uploadBytes, getDownloadURL,
            deleteObject, listAll, collection, doc, getDoc, setDoc, getDocs, deleteDoc,
            query, orderBy, GoogleAuthProvider, signInWithPopup, signOut,
            onAuthStateChanged

    <style>

        .panel-title {

        .panel-hint {

        .btn-upload {

        /* ===== CSS 主題變數（功能一：多主題）===== */
        :root {
            --bg-from: #1a1a2e;
            --bg-to: #050505;
            --accent: #3b82f6;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --panel-border: rgba(255, 255, 255, 0.1);
            --perspective: 1200px;
            --card-w: 260px;
            --card-h: 380px;
        }

        /* 5 套主題 */
        [data-theme="cosmos"] {
            --bg-from: #1a1a2e;
            --bg-to: #050505;
            --accent: #6366f1;
        }

        [data-theme="sunset"] {
            --bg-from: #3d1500;
            --bg-to: #1a0000;
            --accent: #f97316;
        }

        [data-theme="forest"] {
            --bg-from: #0a2a18;
            --bg-to: #050f08;
            --accent: #22c55e;
        }

        [data-theme="rose"] {
            --bg-from: #2a0a2a;
            --bg-to: #0f050f;
            --accent: #ec4899;
        }

        [data-theme="gold"] {
            --bg-from: #1e1700;
            --bg-to: #050400;
            --accent: #eab308;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-to);
            background-image: radial-gradient(circle at center, var(--bg-from) 0%, var(--bg-to) 100%);
            transition: background-color 0.6s ease, background-image 0.6s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            touch-action: none;
        }

        /* ===== 3D 場景 ===== */
        .scene {
            width: 100vw;
            height: 100vh;
            perspective: var(--perspective);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* ===== 旋轉木馬 ===== */
        .carousel {
            width: var(--card-w, 260px);
            height: var(--card-h, 380px);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            cursor: grab;
        }

        .carousel:active {
            cursor: grabbing;
        }

        /* ===== 卡片 ===== */
        .carousel-item {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            border-radius: 12px;
            overflow: visible;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8), 0 0 10px rgba(255, 255, 255, 0.1) inset;
            user-select: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .carousel-item .img-wrap {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            filter: brightness(0.8);
            display: block;
            /* 所有圖片這始透明 + 骨架動畫，避免黑色空框 */
            opacity: 0;
            background: linear-gradient(110deg, #0f1729 30%, #1a2340 50%, #0f1729 70%);
            background-size: 200% 100%;
            animation: imgSkeleton 1.4s ease infinite;
            transition: opacity 0.5s ease, filter 0.3s;
        }

        @keyframes imgSkeleton {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* 圖片實際載入完成後（onload 觸發）淡入顯示 */
        .carousel-item img.img-loaded {
            opacity: 1;
            animation: none;
            background: none;
        }

        .carousel-item:hover img {
            filter: brightness(1.15);
        }

        @supports (-webkit-box-reflect: below) {
            .carousel-item .img-wrap {
                -webkit-box-reflect: below 15px linear-gradient(transparent, transparent, rgba(0, 0, 0, 0.3));
            }
        }

        @supports not (-webkit-box-reflect: below) {
            .carousel-item::after {
                content: '';
                position: absolute;
                top: 100%;
                margin-top: 15px;
                left: 0;
                width: 100%;
                height: 40%;
                border-radius: 12px;
                transform: scaleY(-1);
                opacity: 0.25;
                -webkit-mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.4), transparent);
                mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.4), transparent);
                pointer-events: none;
            }
        }

        /* 浮層說明 */
        .carousel-item .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 28px 14px 14px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.78));
            border-radius: 0 0 12px 12px;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }

        .carousel-item:hover .caption {
            opacity: 1;
            transform: translateY(0);
        }

        .caption-title {
            font-size: .82rem;
            font-weight: 600;
            color: #fff;
            margin: 0 0 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .caption-date {
            font-size: .68rem;
            color: rgba(255, 255, 255, .55);
            margin: 0;
        }

        /* 放大提示 */
        .carousel-item .click-hint {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .15);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .75rem;
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
        }

        .carousel-item:hover .click-hint {
            opacity: 1;
        }

        /* ===== 功能二：標籤篩選橫幅 ===== */
        #tag-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .tag-btn {
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            user-select: none;
        }

        .tag-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
        }

        .tag-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* 標籤選擇 modal（上傳時） */
        #tag-modal {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #tag-modal.open {
            opacity: 1;
            pointer-events: all;
        }

        .tag-modal-box {
            background: #1e1e2e;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 24px 28px;
            width: min(360px, 90vw);
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        .tag-modal-title {
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            text-align: center;
        }

        .tag-modal-desc {
            font-size: .78rem;
            color: rgba(255, 255, 255, .5);
            text-align: center;
        }

        .tag-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .tag-opt {
            padding: 6px 18px;
            border-radius: 50px;
            font-size: .8rem;
            font-weight: 600;
            cursor: pointer;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.75);
            transition: all 0.2s;
        }

        .tag-opt:hover {
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
        }

        .tag-opt.selected {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .tag-modal-confirm {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 10px;
            font-size: .9rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .tag-modal-confirm:hover {
            opacity: 0.85;
        }

        /* ===== 頂部橫幅提示 ===== */
        #storage-banner {
            position: fixed;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(16, 185, 129, 0.88);
            color: #fff;
            padding: 7px 20px;
            border-radius: 50px;
            font-size: .78rem;
            font-weight: 600;
            backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
            z-index: 100;
            white-space: nowrap;
        }

        #storage-banner.show {
            opacity: 1;
        }

        #storage-banner.error {
            background: rgba(239, 68, 68, 0.88);
        }

        /* ===== 雲端同步進度條 ===== */
        #sync-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            z-index: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #sync-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        #sync-overlay .sync-box {
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 2rem 2.5rem;
            min-width: 320px;
            max-width: 480px;
            width: 90vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        #sync-overlay .sync-icon {
            font-size: 2.4rem;
            animation: syncPulse 1.2s ease-in-out infinite;
        }

        @keyframes syncPulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.15);
                opacity: 0.7;
            }
        }

        #sync-overlay .sync-title {
            font-size: 1rem;
            font-weight: 700;
            color: #e2e8f0;
            letter-spacing: 0.05em;
        }

        #sync-overlay .sync-status {
            font-size: 0.8rem;
            color: #94a3b8;
            min-height: 1.2em;
            text-align: center;
        }

        #sync-overlay .sync-track {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            overflow: hidden;
        }

        #sync-overlay .sync-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #34d399, #60a5fa);
            border-radius: 999px;
            transition: width 0.4s cubic-bezier(.2, .8, .2, 1);
        }

        #sync-overlay .sync-count {
            font-size: 0.78rem;
            color: #64748b;
        }

        /* ===== 全螢幕 Lightbox ===== */
        #lightbox {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0);
            opacity: 0;
            pointer-events: none;
            transition: opacity .35s ease, background .35s ease;
        }

        #lightbox.open {
            opacity: 1;
            pointer-events: all;
            background: rgba(0, 0, 0, 0.9);
        }

        .lb-img-wrap {
            position: relative;
            max-width: 90vw;
            max-height: 84vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        #lb-img {
            max-width: 90vw;
            max-height: 78vh;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            transform: scale(0.9);
            transition: transform .35s cubic-bezier(.2, .8, .2, 1);
            display: block;
        }

        #lightbox.open #lb-img {
            transform: scale(1);
        }

        .lb-info {
            text-align: center;
            line-height: 1.4;
        }

        .lb-title {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
        }

        .lb-date {
            font-size: .75rem;
            color: rgba(255, 255, 255, .5);
        }

        .lb-tag {
            display: inline-block;
            margin-top: 4px;
            padding: 2px 12px;
            border-radius: 50px;
            background: var(--accent);
            font-size: .68rem;
            font-weight: 600;
        }

        .lb-counter {
            font-size: .7rem;
            color: rgba(255, 255, 255, .3);
            margin-top: 2px;
        }

        #lb-close {
            position: fixed;
            top: 20px;
            right: 22px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .12);
            border: 1px solid rgba(255, 255, 255, .2);
            color: #fff;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .2s;
            z-index: 1001;
        }

        #lb-close:hover {

        }

        .lb-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);

            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .1);
            border: 1px solid rgba(255, 255, 255, .2);
            color: #fff;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .2s;

        }

        }

        #lb-prev {
            left: 16px;
        }

        #lb-next {
            right: 16px;
        }

        /* ===== 唯讀模式（分享連結）：隱藏所有管理 UI ===== */
        .readonly-mode #user-area,
        .readonly-mode .control-panel,
        .readonly-mode #thumb-strip,
        .readonly-mode #layout-drawer,
        .readonly-mode #bulk-bar {
            display: none !important;
        }

        /* ===== 功能三：Firebase 使用者按鈕 ===== */
        #user-area {
            position: fixed;
            top: 9px;
            right: 16px;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
            max-width: calc(100vw - 32px);
        }

        /* ===== RWD：平板（≤768px） ===== */
        @media (max-width: 768px) {
            #user-area {
                top: 6px;
                right: 8px;
                gap: 5px;
            }

            #user-area button {
                padding: 4px 10px !important;
                font-size: .68rem !important;
            }

            #user-avatar {
                width: 26px !important;
                height: 26px !important;
            }

            #tag-bar {
                top: 52px !important;
            }
        }

        /* ===== RWD：手機（≤480px） ===== */
        @media (max-width: 480px) {

            /* 使用者區塊改至底部，避免遮擋畫廊 */
            #user-area {
                top: auto;
                bottom: 0;
                right: 0;
                left: 0;
                max-width: 100vw;
                background: rgba(10, 10, 25, 0.92);
                backdrop-filter: blur(12px);
                border-top: 1px solid rgba(255, 255, 255, .1);
                padding: 8px 12px;
                justify-content: center;
                gap: 6px;
                flex-wrap: wrap;
                border-radius: 0;
            }

            #user-area button {
                padding: 5px 12px !important;
                font-size: .7rem !important;
                border-radius: 16px !important;
            }

            #user-avatar {
                width: 28px !important;
                height: 28px !important;
            }

            /* 標籤篩選列回到頂部 */
            #tag-bar {
                top: 8px !important;
                left: 0 !important;
                right: 0 !important;
                justify-content: center;
            }

            /* 控制面板在手機向上移動，避免被底部 user-area 遮住 */
            .control-panel {
                /* 超小螢幕（≤430px）：同樣適用折疊邏輯，覆蓋掉此前的 bottom:80px */
                bottom: 0 !important;
                max-width: 100% !important;
                padding: 0 !important;
                gap: 0 !important;
                border-radius: 18px 18px 0 0 !important;
            }

            .btn-row {
                gap: 5px !important;
            }

            .btn-gallery {
                padding: 5px 10px !important;
                font-size: .68rem !important;
            }

            .btn-upload {
                padding: 5px 10px !important;
                font-size: .68rem !important;
            }
        }



        #user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
            display: none;
        }

        #login-btn,
        #logout-btn {
            padding: 5px 16px;
            border-radius: 50px;
            font-size: .75rem;
            font-weight: 700;
            cursor: pointer;
            border: 1.5px solid var(--accent);
            transition: background .2s, color .2s;
        }

        #login-btn {
            background: transparent;
            color: var(--accent);
        }

        #login-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        #logout-btn {
            background: rgba(239, 68, 68, .15);
            border-color: #ef4444;
            color: #ef4444;
            display: none;
        }

        #logout-btn:hover {
            background: rgba(239, 68, 68, .35);
        }

        #cloud-sync-btn {
            padding: 5px 14px;
            border-radius: 50px;
            font-size: .72rem;
            font-weight: 600;
            cursor: pointer;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .2);
            color: rgba(255, 255, 255, .7);
            display: none;
            transition: background .2s;
        }

        #cloud-sync-btn:hover {
            background: rgba(255, 255, 255, .18);
            color: #fff;
        }

        #cloud-restore-btn {
            padding: 5px 14px;
            border-radius: 50px;
            font-size: .72rem;
            font-weight: 600;
            cursor: pointer;
            background: rgba(96, 165, 250, .15);
            border: 1px solid rgba(96, 165, 250, .4);
            color: rgba(147, 197, 253, .9);
            display: none;
            transition: background .2s;
        }

        #cloud-restore-btn:hover {
            background: rgba(96, 165, 250, .3);
            color: #fff;
        }

        #delete-all-btn {
            padding: 5px 14px;
            border-radius: 50px;
            font-size: .72rem;
            font-weight: 600;
            cursor: pointer;
            background: rgba(239, 68, 68, .15);
            border: 1px solid rgba(239, 68, 68, .45);
            color: rgba(252, 165, 165, .9);
            display: none;
            transition: background .2s;
        }

        #delete-all-btn:hover {
            background: rgba(239, 68, 68, .35);
            color: #fff;
        }

        /* 確認刪除 modal */
        #delete-confirm-modal {
            position: fixed;
            inset: 0;
            z-index: 1001;
            background: rgba(0, 0, 0, .65);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .28s;
        }

        #delete-confirm-modal.show {
            opacity: 1;
            pointer-events: all;
        }

        .del-modal-box {
            background: rgba(15, 23, 42, .95);
            border: 1px solid rgba(239, 68, 68, .35);
            border-radius: 20px;
            padding: 2rem 2.2rem;
            max-width: 380px;
            width: 90vw;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .6);
        }

        .del-modal-icon {
            font-size: 2.4rem;
        }

        .del-modal-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #fca5a5;
        }

        .del-modal-desc {
            font-size: .82rem;
            color: #94a3b8;
            line-height: 1.6;
        }

        .del-modal-btns {
            display: flex;
            gap: .75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .del-modal-btns button {
            flex: 1;
            padding: .55rem 1rem;
            border-radius: 999px;
            border: none;
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }

        #del-cancel-btn {
            background: rgba(255, 255, 255, .1);
            color: #cbd5e1;
        }

        #del-cancel-btn:hover {
            background: rgba(255, 255, 255, .18);
        }

        #del-confirm-btn {
            background: #dc2626;
            color: #fff;
        }

        #del-confirm-btn:hover {
            background: #b91c1c;
        }

        /* ===== 控制面板 ===== */
        .control-panel {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: var(--panel-bg);
            padding: 14px 22px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--panel-border);
            transition: background 0.6s, opacity 0.8s ease;
        }

        /* ── 桌機版：把手區隱藏，直接顯示 panel-title ── */
        .panel-handle {
            display: none;
        }

        /* ── 折疊底部抽屜 ── */
        .control-panel.panel-dim {
            opacity: 0.15;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        #file-upload {
            display: none;
        }

        /* ===== 功能AE：批次上傳進度條 ===== */
        #upload-progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            display: none;
            flex-direction: column;
            background: rgba(10, 10, 30, .92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, .08);
            padding: 10px 20px 12px;
        }

        #upload-progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, .12);
            border-radius: 99px;
            overflow: hidden;
            margin-top: 8px;
        }

        #upload-progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 99px;
            background: linear-gradient(90deg, #6366f1, #a78bfa, #38bdf8);
            background-size: 200% 100%;
            transition: width .3s ease;
            animation: uploadShimmer 1.5s linear infinite;
        }

        @keyframes uploadShimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        #upload-progress-label {
            font-size: .78rem;
            color: rgba(255, 255, 255, .7);
            letter-spacing: .02em;
        }

        #upload-progress-count {
            font-size: .72rem;
            color: rgba(148, 163, 184, .8);
            margin-left: auto;
        }

        #upload-progress-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }


        /* ===== 功能一：主題色票 ===== */
        .theme-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .theme-row label {
            font-size: .65rem;
            color: rgba(255, 255, 255, .4);
            margin-right: 2px;
        }

        .theme-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform .2s, border-color .2s;
        }

        .theme-dot:hover {
            transform: scale(1.25);
        }

        .theme-dot.active {
            border-color: #fff;
            transform: scale(1.2);
        }

        /* ===== RWD ===== */
        @media (max-width:768px) {
            .carousel {
                width: 200px;
                height: 300px;
            }

            /* ── 手機版：可折疊底部抽屜 ── */
            .control-panel {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                max-width: 100%;
                transform: none;
                border-radius: 18px 18px 0 0;
                padding: 0;
                gap: 0;
                overflow: hidden;
                transition: max-height 0.38s cubic-bezier(.4, 0, .2, 1),
                    background 0.6s, opacity 0.8s ease;
                max-height: 60px;
                /* 折疊：只露把手+標題 */
            }

            /* 展開狀態 */
            .control-panel.panel-expanded {
                max-height: 280px;
                /* 展開：足夠容納所有按鈕 */
            }

            /* 折疊把手條（放大可點擊區域，更好按） */
            .panel-handle {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 5px;
                padding: 12px 20px 10px;
                cursor: pointer;
                user-select: none;
                -webkit-user-select: none;
                min-height: 52px;
                justify-content: center;
            }

            .panel-handle-bar {
                width: 48px;
                height: 5px;
                border-radius: 99px;
                background: rgba(255, 255, 255, 0.45);
                flex-shrink: 0;
            }

            .panel-handle .panel-title {
                margin: 0;
                font-size: 0.9rem;
            }

            /* 展開後才顯示 hint 和按鈕區 */
            .control-panel .panel-hint,
            .control-panel .btn-row,
            .control-panel .theme-row,
            .control-panel .keyboard-hint {
                overflow: hidden;
                max-height: 0;
                opacity: 0;
                transition: max-height 0.32s ease, opacity 0.28s ease;
                padding: 0 12px;
            }

            .control-panel.panel-expanded .panel-hint,
            .control-panel.panel-expanded .btn-row,
            .control-panel.panel-expanded .theme-row,
            .control-panel.panel-expanded .keyboard-hint {
                max-height: 120px;
                opacity: 1;
                padding: 2px 12px;
            }

            /* 展開箭頭（放大，更好辨識） */
            .panel-handle::after {
                content: '▲';
                font-size: 1rem;
                color: rgba(255, 255, 255, 0.55);
                transition: transform 0.35s ease;
                line-height: 1;
            }

            .control-panel.panel-expanded .panel-handle::after {
                transform: rotate(180deg);
            }

            .lb-arrow {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }

            #lb-prev {
                left: 4px;
            }

            #lb-next {
                right: 4px;
            }
        }

        /* ===== 功能B：粒子畫布 ===== */
        #particle-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .scene {
            z-index: 1;
        }

        /* ===== 功能D：卡片翻轉雙面 ===== */
        .carousel-item-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.65s cubic-bezier(.2, .8, .2, 1);
            border-radius: 12px;
        }

        .carousel-item.flipped .carousel-item-inner {
            transform: rotateY(180deg) !important;
            animation: none !important;
            /* 翻面時停止一切動畫干擾 */
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 12px;
        }

        .card-front {
            overflow: hidden;
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, rgba(18, 18, 42, 0.97), rgba(6, 6, 18, 0.99));
            border: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px 14px;
            text-align: center;
        }

        .back-icon {
            font-size: 2rem;
            margin-bottom: 4px;
        }

        .back-title {
            font-size: .9rem;
            font-weight: 700;
            color: #fff;
            margin: 0;
            line-height: 1.35;
        }

        .back-date {
            font-size: .7rem;
            color: rgba(255, 255, 255, .45);
            margin: 0;
        }

        .back-tag-badge {
            padding: 3px 14px;
            border-radius: 50px;
            background: var(--accent);
            font-size: .7rem;
            font-weight: 600;
            color: #fff;
        }

        /* 翻面按鈕 */
        .flip-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .15);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, .25);
            color: #fff;
            font-size: .7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity .3s, background .2s;
            z-index: 20;
        }

        .carousel-item:hover .flip-btn {
            opacity: 1;
        }

        .flip-btn:hover {
            background: rgba(255, 255, 255, .3);
        }

        .back-flip-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .1);
            border: 1px solid rgba(255, 255, 255, .2);
            color: #fff;
            font-size: .7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: .6;
            transition: opacity .2s, background .2s;
        }

        .back-flip-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, .25);
        }

        /* ===== 功能C：縮圖帶 ===== */
        #thumb-strip {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 76px;
            z-index: 8;
            display: flex;
            align-items: center;
            overflow-x: auto;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, .55);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, .07);
            transform: translateY(100%);
            transition: transform .35s cubic-bezier(.2, .8, .2, 1);
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, .15) transparent;
        }

        #thumb-strip.visible {
            transform: translateY(0);
        }

        .thumb-item {
            flex-shrink: 0;
            width: 46px;
            height: 58px;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color .2s, transform .2s;
            position: relative;
        }

        .thumb-item:hover {
            transform: scale(1.12);
            border-color: var(--accent);
        }

        .thumb-item.active {
            border-color: #fff;
            box-shadow: 0 0 8px rgba(255, 255, 255, .4);
        }

        .thumb-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .thumb-num {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            font-size: .48rem;
            color: rgba(255, 255, 255, .8);
            text-align: center;
            background: rgba(0, 0, 0, .45);
            padding: 1px 0;
        }

        /* AY: 正面高亮 — 最前方卡片金色光暈邊框 */
        .card-focused {
            outline: 2.5px solid rgba(251, 191, 36, 0.75);
            outline-offset: 5px;
            filter: brightness(1.0) !important;
        }

        /* ===== 功能E：編輯模式 ===== */
        .carousel-item.edit-mode-active {
            outline: 2px dashed rgba(251, 191, 36, .7);
            outline-offset: 3px;
            cursor: grab;
        }

        .carousel-item.drag-over {
            outline-color: #22c55e;
        }

        .card-delete-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(220, 38, 38, .85);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: transform .15s, background .15s;
            backdrop-filter: blur(4px);
        }

        .card-delete-btn:hover {
            transform: scale(1.2);
            background: #dc2626;
        }

        /* ===== 功能H：批次操作列 ===== */
        #bulk-bar {
            position: fixed;
            top: -60px;
            left: 0;
            right: 0;
            height: 52px;
            background: rgba(15, 23, 42, .92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, .08);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 9000;
            transition: top .3s cubic-bezier(.2, .8, .2, 1);
        }

        #bulk-bar.show {
            top: 0;
        }

        #bulk-bar .bulk-count {
            color: #94a3b8;
            font-size: .85rem;
        }

        #bulk-bar button {
            padding: 6px 16px;
            border-radius: 999px;
            border: none;
            font-size: .82rem;
            cursor: pointer;
            font-weight: 600;
            transition: transform .15s;
        }

        #bulk-bar button:hover {
            transform: scale(1.05);
        }

        #bulk-select-all {
            background: #334155;
            color: #e2e8f0;
        }

        #bulk-delete-btn {
            background: #dc2626;
            color: #fff;
        }

        #bulk-cancel-btn {
            background: #475569;
            color: #e2e8f0;
        }

        .carousel-item.bulk-selected::after {
            content: '✓';
            position: absolute;
            top: 8px;
            left: 8px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 25;
        }

        /* ===== 功能F：Lightbox 標題可編輯 ===== */
        #lb-title[contenteditable="true"] {
            outline: 2px solid var(--accent);
            border-radius: 4px;
            padding: 0 4px;
            background: rgba(255, 255, 255, .06);
            cursor: text;
            min-width: 60px;
        }

        #lb-title::after {
            content: ' ✏️';
            font-size: .7em;
            opacity: 0;
            transition: opacity .2s;
        }

        #lb-title:hover::after {
            opacity: .6;
        }

        /* ===== 功能W：進場波浪動畫（套用在 inner 過渡蛋形容器，防止覆蓋 3D rotateY+translateZ）===== */
        @keyframes cardEnterW {
            from {
                opacity: 0;
                transform: scale(0.82) translateY(24px);
                filter: blur(4px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }

        .entering-wave {
            animation: cardEnterW .45s cubic-bezier(.22, 1, .36, 1) both;
        }

        /* ===== 功能AA：公開相簿開關按鈕 ===== */
        #public-toggle-btn {
            display: none;
            /* 登入後才顯示 */
            transition: background 0.25s, transform 0.15s;
        }

        #public-toggle-btn.is-public {
            background: rgba(34, 197, 94, 0.25) !important;
            border: 1px solid rgba(34, 197, 94, 0.5) !important;
            color: #86efac !important;
        }

        #public-toggle-btn.is-public:hover {
            background: rgba(34, 197, 94, 0.38) !important;
        }

        /* ===== 功能AB：相機型號强章 ===== */
        .camera-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            padding: 3px 10px;
            background: rgba(99, 102, 241, 0.18);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 50px;
            font-size: .68rem;
            color: #a5b4fc;
            letter-spacing: .02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }

        @keyframes themeFade {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        body.theme-switching::before {
            animation: themeFade .55s ease both;
        }

        /* ===== 功能U：版型設定抽屜 ===== */
        #layout-drawer {
            position: fixed;
            right: -240px;
            top: 50%;
            transform: translateY(-50%);
            width: 220px;
            background: rgba(15, 23, 42, .96);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 16px 0 0 16px;
            padding: 18px 16px 18px 20px;
            z-index: 8000;
            transition: right .35s cubic-bezier(.2, .8, .2, 1);
            backdrop-filter: blur(14px);
            box-shadow: -8px 0 32px rgba(0, 0, 0, .45);
        }

        #layout-drawer.open {
            right: 0;
        }

        #layout-toggle-btn {
            position: absolute;
            left: -38px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            background: rgba(15, 23, 42, .9);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 8px 0 0 8px;
            color: #e2e8f0;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s;
        }

        #layout-toggle-btn:hover {
            background: rgba(99, 102, 241, .4);
        }

        .layout-title {
            font-size: .75rem;
            font-weight: 700;
            color: #94a3b8;
            letter-spacing: .08em;
            margin-bottom: 14px;
            text-transform: uppercase;
        }

        .layout-row {
            margin-bottom: 14px;
        }

        .layout-row label {
            display: flex;
            justify-content: space-between;
            font-size: .72rem;
            color: #cbd5e1;
            margin-bottom: 5px;
        }

        .layout-row label span {
            color: var(--accent);
            font-weight: 600;
            min-width: 36px;
            text-align: right;
        }

        .layout-row input[type=range] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .layout-reset-btn {
            width: 100%;
            padding: 6px 0;
            margin-top: 4px;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 8px;
            color: #94a3b8;
            font-size: .72rem;
            cursor: pointer;
            transition: background .18s;
        }

        .layout-reset-btn:hover {
            background: rgba(255, 255, 255, .12);
        }

        /* AU: 情境預設小按鈕 */
        .scene-preset-btn {
            padding: 4px 9px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, .18);
            background: rgba(255, 255, 255, .07);
            color: #cbd5e1;
            font-size: .68rem;
            cursor: pointer;
            transition: background .18s, border-color .18s, color .18s;
            white-space: nowrap;
        }

        .scene-preset-btn:hover {
            background: rgba(255, 255, 255, .14);
            color: #fff;
        }

        .scene-preset-btn.active {
            background: rgba(251, 191, 36, .22);
            border-color: rgba(251, 191, 36, .55);
            color: #fbbf24;
            font-weight: 600;
        }

        /* ===== 功能Y：唯讀模式 ===== */
        body.readonly-mode .control-panel,
        body.readonly-mode #tag-manage-modal,
        body.readonly-mode #bulk-bar,
        body.readonly-mode #layout-drawer {
            display: none !important;
        }

        body.readonly-mode #tag-bar {
            top: 0;
        }

        #share-bar {
            display: none;
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, .92);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 12px;
            padding: 8px 18px;
            font-size: .78rem;
            color: #94a3b8;
            z-index: 7000;
            backdrop-filter: blur(12px);
            gap: 10px;
            align-items: center;
            flex-wrap: nowrap;
            /* 不換行 */
            white-space: nowrap;
            max-width: calc(100vw - 32px);
            box-sizing: border-box;
        }

        #share-bar.visible {
            display: flex;
        }

        #share-bar>span {
            flex-shrink: 0;
            /* 「👁 唯讀相簿」不縮 */
        }

        #share-bar strong {
            color: #e2e8f0;
            overflow: hidden;
            text-overflow: ellipsis;
            /* 名稱太長則賭...取代 */
            white-space: nowrap;
            max-width: 38vw;
            /* 手機限寬，超出截斷 */
            flex-shrink: 1;
        }

        #share-bar a {
            color: var(--accent);
            text-decoration: none;
        }

        /* 手機：按鈕只顯示圖示 */
        @media (max-width: 480px) {
            #share-bar {
                padding: 7px 14px;
                font-size: .72rem;
                bottom: 12px;
                gap: 8px;
            }

            #share-bar>span {
                display: none;
                /* 隱藏「👁 唯讀」文字，節省空間 */
            }

            #share-bar strong {
                max-width: 45vw;
            }

            #share-copy-btn {
                padding: 4px 10px !important;
                font-size: .7rem !important;
            }
        }

        #share-link-btn {
            padding: 5px 14px;
            background: var(--accent);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: .75rem;
            cursor: pointer;
            transition: opacity .18s;
        }

        #share-link-btn:hover {
            opacity: .85;
        }

        /* ===== QR Code 分享 Modal ===== */
        #qr-modal {
            position: fixed;
            inset: 0;
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #qr-modal.show {
            opacity: 1;
            pointer-events: all;
        }

        .qr-box {
            background: linear-gradient(145deg, rgba(30, 30, 60, 0.97), rgba(15, 15, 35, 0.99));
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 32px 28px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: min(90vw, 340px);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.35s cubic-bezier(.34, 1.56, .64, 1);
        }

        #qr-modal.show .qr-box {
            transform: scale(1) translateY(0);
        }

        .qr-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: .02em;
        }

        .qr-subtitle {
            font-size: .75rem;
            color: rgba(255, 255, 255, .45);
            text-align: center;
            line-height: 1.5;
            margin-top: -8px;
        }

        #qr-canvas-wrap {
            background: #fff;
            border-radius: 16px;
            padding: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #qr-canvas-wrap canvas,
        #qr-canvas-wrap img {
            display: block;
            border-radius: 4px;
        }

        .qr-url-row {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .qr-url-input {
            flex: 1;
            background: rgba(255, 255, 255, .07);
            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 10px;
            padding: 8px 12px;
            color: rgba(255, 255, 255, .75);
            font-size: .72rem;
            outline: none;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .qr-copy-btn {
            padding: 8px 16px;
            border-radius: 10px;
            background: var(--accent);
            border: none;
            color: #fff;
            font-size: .75rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .18s;
            white-space: nowrap;
        }

        .qr-copy-btn:hover {
            opacity: .85;
        }

        .qr-close-btn {
            padding: 6px 24px;
            border-radius: 50px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .15);
            color: rgba(255, 255, 255, .6);
            font-size: .75rem;
            cursor: pointer;
            transition: background .2s;
        }

        .qr-close-btn:hover {
            background: rgba(255, 255, 255, .18);
            color: #fff;
        }

        /* ===== 功能I：自訂標籤管理 Modal ===== */
        #tag-manage-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .65);
            backdrop-filter: blur(8px);
            z-index: 8500;
            align-items: center;
            justify-content: center;
        }

        #tag-manage-modal.open {
            display: flex;
        }

        .tag-manage-box {
            background: rgba(15, 23, 42, .97);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 16px;
            padding: 24px;
            width: min(420px, 92vw);
            box-shadow: 0 24px 64px rgba(0, 0, 0, .6);
        }

        .tag-manage-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 16px;
            text-align: center;
        }

        .tag-manage-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tag-manage-input-row input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, .07);
            border: 1px solid rgba(255, 255, 255, .15);
            color: #f1f5f9;
            font-size: .9rem;
            outline: none;
        }

        .tag-manage-input-row input::placeholder {
            color: rgba(255, 255, 255, .3);
        }

        .tag-manage-input-row input:focus {
            border-color: var(--accent);
        }

        .tag-add-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: .9rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 999px;
            padding: 4px 10px 4px 12px;
            font-size: .82rem;
            color: #e2e8f0;
        }

        .tag-chip.default {
            opacity: .55;
        }

        .tag-chip-del {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(220, 38, 38, .7);
            border: none;
            color: #fff;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s;
        }

        .tag-chip-del:hover {
            background: #dc2626;
        }

        .tag-manage-close {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, .07);
            color: #94a3b8;
            font-size: .9rem;
            cursor: pointer;
            transition: background .15s;
        }

        .tag-manage-close:hover {
            background: rgba(255, 255, 255, .12);
        }
    </style>

</head>

<body data-theme="cosmos">

    <!-- ===== 粒子背景畫布 ===== -->
    <canvas id="particle-canvas"></canvas>

    <!-- ===== 標籤篩選橫幅 ===== -->
    <div id="tag-bar">
        <!-- 由 JS 動態生成 -->
    </div>

    <!-- ===== Firebase 使用者區域 ===== -->
    <div id="user-area">
        <img id="user-avatar" src="" alt="頭像">
        <button id="delete-all-btn">🗑️ 全部刪除</button>
        <button id="cloud-restore-btn">📲 從雲端還原</button>
        <button id="cloud-sync-btn">☁️ 同步雲端</button>
        <button id="login-btn">🔐 登入</button>
        <button id="logout-btn">登出</button>
    </div>

    <!-- 刪除確認 modal -->
    <div id="delete-confirm-modal">
        <div class="del-modal-box">
            <div class="del-modal-icon">⚠️</div>
            <div class="del-modal-title">確定要刪除全部照片？</div>
            <div class="del-modal-desc">這將同時清除<strong>本機</strong>與<strong>雲端</strong>的所有圖片，且無法恢復。</div>
            <div class="del-modal-btns">
                <button id="del-cancel-btn">取消</button>
                <button id="del-confirm-btn">✔️ 確定刪除</button>
            </div>
        </div>
    </div>

    <!-- ===== 3D 場景 ===== -->
    <div class="scene" id="scene">
        <div class="carousel" id="carousel"></div>
    </div>

    <!-- ===== 頂部橫幅提示 ===== -->
    <div id="storage-banner">💾 圖片已儲存！</div>

    <!-- 雲端同步進度框 -->
    <div id="sync-overlay">
        <div class="sync-box">
            <div class="sync-icon">☁️</div>
            <div class="sync-title">同步對雲端...</div>
            <div class="sync-track">
                <div class="sync-fill" id="sync-fill"></div>
            </div>
            <div class="sync-count" id="sync-count">0 / 0</div>
            <div class="sync-status" id="sync-status">準備中...</div>
        </div>
    </div>

    <!-- ===== 批次操作列 (功能H) ===== -->
    <div id="bulk-bar">
        <span class="bulk-count" id="bulk-count-label">已選 0 張</span>
        <button id="bulk-select-all">全選</button>
        <button id="bulk-delete-btn">🗑 刪除</button>
        <button id="bulk-cancel-btn">✕ 取消</button>
    </div>

    <!-- ===== 標籤選擇 Modal ===== -->
    <div id="tag-modal">
        <div class="tag-modal-box">
            <div class="tag-modal-title">📁 選擇圖片分類</div>
            <div class="tag-modal-desc">為這批圖片選一個標籤</div>
            <div class="tag-options" id="tag-options"></div>
            <button class="tag-modal-confirm" id="tag-confirm-btn">✅ 確認加入畫廊</button>
        </div>
    </div>

    <!-- ===== 全螢幕 Lightbox ===== -->
    <div id="lightbox">
        <button id="lb-close" title="關閉（Esc）">✕</button>
        <button id="lb-prev" class="lb-arrow" title="上一張（←）">‹</button>
        <button id="lb-next" class="lb-arrow" title="下一張（→）">›</button>
        <div class="lb-img-wrap">
            <img id="lb-img" src="" alt="">
            <div class="lb-info">
                <div class="lb-title" id="lb-title"></div>
                <div class="lb-date" id="lb-date"></div>
                <div id="lb-tag"></div>
                <div class="lb-counter" id="lb-counter"></div>
            </div>
        </div>
    </div>

    <!-- ===== 控制面板 ===== -->
    <div class="control-panel">
        <!-- 手機版折疊把手（桌機版 CSS 隱藏此區，直接顯示 panel-title） -->
        <div class="panel-handle" id="panel-handle">
            <div class="panel-handle-bar"></div>
            <h2 class="panel-title">我的 3D 畫廊</h2>
        </div>
        <p class="panel-hint">拖曳旋轉 ｜ ↑↓ 傾斜 ｜ 滾輪縮放 ｜ 點擊放大</p>

        <div class="btn-row">
            <!-- 上傳 -->
            <label for="file-upload" class="btn-upload">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                </svg>
                選擇圖片
            </label>
            <input type="file" id="file-upload" multiple accept="image/*">

            <!-- 自動旋轉 -->
            <button id="auto-rotate-btn" class="btn-gallery btn-emerald">
                <span id="rotate-icon">⏸</span><span id="rotate-label">自動旋轉</span>
            </button>

            <!-- 清除 -->
            <button id="clear-storage-btn" class="btn-gallery btn-red btn-hidden">
                🗑 清除
            </button>

            <!-- 縮圖帶開關 -->
            <button id="thumb-toggle-btn" class="btn-gallery btn-slate">
                🎞️ 縮圖
            </button>

            <!-- 編輯模式 (功能E) -->
            <button id="edit-mode-btn" class="btn-gallery btn-slate">
                ✏️ 編輯
            </button>

            <!-- 自訂標籤管理 (功能I) -->
            <button id="tag-manage-btn" class="btn-gallery btn-slate">
                ⚙️ 標籤
            </button>

            <!-- 沈浸模式 -->
            <button id="immersive-btn" class="btn-gallery btn-immersive">
                🎥 沈浸
            </button>

            <!-- 版型設定 (功能U) -->
            <button id="layout-panel-btn" class="btn-gallery btn-slate">
                📐 版型
            </button>

            <!-- 公開相簿開關 (功能AA) - 登入後才顯示 -->
            <button id="public-toggle-btn" class="btn-gallery btn-slate">
                🌐 公開
            </button>

            <!-- 公開分享 (功能Y) -->
            <button id="share-link-btn" class="btn-gallery btn-slate">
                🔗 分享
            </button>
        </div>

        <!-- 功能一：主題色票 -->
        <div class="theme-row">
            <label>主題：</label>
            <div class="theme-dot active" data-theme="cosmos" style="background:linear-gradient(135deg,#1a1a2e,#6366f1)"
                title="宇宙深藍"></div>
            <div class="theme-dot" data-theme="sunset" style="background:linear-gradient(135deg,#3d1500,#f97316)"
                title="日落橘紅"></div>
            <div class="theme-dot" data-theme="forest" style="background:linear-gradient(135deg,#0a2a18,#22c55e)"
                title="薄荷翠綠"></div>
            <div class="theme-dot" data-theme="rose" style="background:linear-gradient(135deg,#2a0a2a,#ec4899)"
                title="玫瑰暮紫"></div>
            <div class="theme-dot" data-theme="gold" style="background:linear-gradient(135deg,#1e1700,#eab308)"
                title="午夜黑金"></div>
        </div>

        <p class="panel-hint">鍵盤 ← → ↑ ↓ ｜ 圖片自動儲存於瀏覽器</p>
    </div>

    <!-- ===== QR Code 分享 Modal ===== -->
    <div id="qr-modal">
        <div class="qr-box">
            <div class="qr-title">🔗 掃描 QR Code 分享畫廊</div>
            <p class="qr-subtitle">用手機相機掃描，立即開啟 3D 畫廊！</p>
            <div id="qr-canvas-wrap"></div>
            <div class="qr-url-row">
                <input class="qr-url-input" id="qr-url-input" readonly>
                <button class="qr-copy-btn" id="qr-copy-btn">📋 複製</button>
            </div>
            <button class="qr-close-btn" id="qr-close-btn">關閉</button>
        </div>
    </div>

    <!-- ===== 縮圖帶 ===== -->

    <!-- ===== 功能U：版型設定抽屜 ===== -->
    <div id="layout-drawer">

        <div class="layout-title">版型設定</div>

        <!-- AU: 情境預設快速切換 -->
        <div class="layout-row" style="flex-direction:column;gap:6px;">
            <label>🎨 情境預設</label>
            <div style="display:flex;gap:5px;flex-wrap:wrap;">
                <button class="scene-preset-btn" data-preset="standard" title="260×380  1200px">🎠 標準</button>
                <button class="scene-preset-btn" data-preset="immersive" title="420×600  750px">🎥 沈浸</button>
                <button class="scene-preset-btn" data-preset="compact" title="180×260  1600px">🗂 精選</button>
                <button class="scene-preset-btn" data-preset="gallery" title="320×480  900px">🖼 藝廊</button>
                <button class="scene-preset-btn" data-preset="wide" title="540×305  1400px">📸 橫幅</button>

        <div class="layout-row">

        <div class="layout-row">

            <input id="lv-speed" type="range" min="0.05" max="1.0" value="0.25" step="0.05">

        <!-- AS: 靈敏度細調 -->
        <div class="layout-row" style="margin-top:6px;">
            <label>🖱 拖曳靈敏 <span id="lv-drag-val">1.0x</span></label>

        <div class="layout-row">
            <label>📱 觸控靈敏 <span id="lv-touch-val">1.0x</span></label>

        <div class="layout-row">
            <label>⌨ 鍵盤步進 <span id="lv-key-val">1排</span></label>
            <input id="lv-key" type="range" min="1" max="5" value="1" step="1">
        </div>

        <!-- AZ: 光源方向控制 -->
        <div class="layout-row" style="margin-top:6px;">
            <label>💡 光源角度 <span id="lv-light-val">0°</span></label>
            <input id="lv-light" type="range" min="0" max="359" value="0" step="5">
        </div>

        <!-- BA: 快速跳至指定卡片 -->
        <div class="layout-row" id="lv-jump-row" style="margin-top:6px;display:none;">
            <label>🎯 跳至卡片</label>
            <div style="display:flex;gap:6px;align-items:center;">
                <input id="lv-jump-input" type="number" min="1" placeholder="編號"
                    style="width:60px;padding:4px 6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-size:.75rem;text-align:center;">
                <button id="lv-jump-btn"
                    style="padding:4px 10px;border-radius:8px;border:none;background:rgba(99,102,241,.6);color:#fff;font-size:.72rem;cursor:pointer;white-space:nowrap;">跳
                    ▶</button>
            </div>
        </div>

        <button class="layout-reset-btn" id="lv-reset">↺ 還原預設</button>

    <!-- ===== 功能Y：唯讀分享列 ===== -->

    <div id="tag-manage-modal">
        <div class="tag-manage-box">
            <div class="tag-manage-title">⚙️ 標籤管理</div>
