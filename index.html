        async function deleteAllPhotos() {
            const fb = window._fb;
            if (!fb || !currentUser) return;

            // 顯示進度框
            const syncOv = document.getElementById('sync-overlay');
            const syncFl = document.getElementById('sync-fill');
            const syncCt = document.getElementById('sync-count');
            const syncSt = document.getElementById('sync-status');
            const syncTi = syncOv ? syncOv.querySelector('.sync-title') : null;
            if (syncTi) syncTi.textContent = '🗑️ 刪除中...';
            if (syncOv) syncOv.querySelector('.sync-icon').textContent = '🗑️';
            if (syncFl) syncFl.style.width = '0%';
            if (syncCt) syncCt.textContent = '準備中...';
            if (syncSt) syncSt.textContent = '正在刪除 Firestore 資料...';
            if (syncOv) syncOv.classList.add('show');

            try {
                const uid = currentUser.uid;

                // ① 刪除 Firestore 所有圖片文件
                const snap = await fb.getDocs(fb.collection(fb.db, `users/${uid}/images`));
                const total = snap.docs.length;
                let done = 0;
                for (const d of snap.docs) {
                    await fb.deleteDoc(fb.doc(fb.db, `users/${uid}/images`, d.id));
                    done++;
                    if (syncCt) syncCt.textContent = `Firestore ${done} / ${total}`;
                    if (syncFl) syncFl.style.width = `${Math.round(done / Math.max(total, 1) * 50)}%`;
                }

                // ② 刪除 Firebase Storage 資料夾內所有檔案
                if (syncSt) syncSt.textContent = '正在刪除 Storage 檔案...';
                try {
                    const folderRef = fb.storageRef(fb.storage, `users/${uid}/images`);
                    const listResult = await fb.listAll(folderRef);
                    const files = listResult.items;
                    done = 0;
                    for (const fileRef of files) {
                        await fb.deleteObject(fileRef);
                        done++;
                        if (syncCt) syncCt.textContent = `Storage ${done} / ${files.length}`;
                        if (syncFl) syncFl.style.width = `${50 + Math.round(done / Math.max(files.length, 1) * 50)}%`;
                    }
                } catch (storErr) {
                    // Storage 刪除失敗不阻擋（可能本來就沒有 Storage 檔案）
                    console.warn('Storage 刪除跳過：', storErr.message);
                }

                // ③ 清除本機
                allImageData = [];
                filteredData = [];
                activeTag = '全部';
                localStorage.removeItem(LS_KEY_IMAGES);
                buildTagBar();
                buildGallery();

                if (syncFl) syncFl.style.width = '100%';
                if (syncCt) syncCt.textContent = '✅ 全部刪除完成';
                if (syncSt) syncSt.textContent = '本機與雲端已清空';
                setTimeout(() => { if (syncOv) syncOv.classList.remove('show'); }, 1200);
                showBanner('🗑️ 已刪除所有照片', false);

            } catch (e) {
                if (syncOv) syncOv.classList.remove('show');
                showBanner('❌ 刪除失敗：' + e.message, true);
            }
        }

        loginBtn.addEventListener('click', async () => {
            const fb = window._fb;
            if (!fb) { showBanner('⚠️ Firebase 尚未設定，請填入 firebaseConfig', true); return; }
            try {
                await fb.signInWithPopup(fb.auth, new fb.GoogleAuthProvider());
            } catch (e) { showBanner('登入失敗：' + e.message, true); }
        });

        // 同步鎖：防止同步中途登出
        let isSyncing = false;

        // 進度條輔助工具
        const syncOverlay = document.getElementById('sync-overlay');
        const syncFill = document.getElementById('sync-fill');
        const syncCount = document.getElementById('sync-count');
        const syncStatus = document.getElementById('sync-status');

        function showSyncProgress(current, total, statusText) {
            const pct = total > 0 ? Math.round((current / total) * 100) : 0;
            syncFill.style.width = pct + '%';
            syncCount.textContent = `${current} / ${total} 張（${pct}%）`;
            syncStatus.textContent = statusText || '';
            syncOverlay.classList.add('show');
        }
        function hideSyncProgress() {
            syncOverlay.classList.remove('show');
            syncFill.style.width = '0%';
        }

        logoutBtn.addEventListener('click', async () => {
            const fb = window._fb;
            if (!fb) return;
            if (isSyncing) { showBanner('⚠️ 同步中，請稍候再登出', true); return; }
            await fb.signOut(fb.auth);
            showBanner('已登出', false);
        });

        // 同步上傳到雲端
        cloudSyncBtn.addEventListener('click', async () => {
            const fb = window._fb;
            if (!fb || !currentUser) return;
            if (allImageData.length === 0) { showBanner('沒有圖片可以同步', true); return; }
            if (isSyncing) { showBanner('⏳ 同步中，請稍候…', false); return; }

            isSyncing = true;
            cloudSyncBtn.disabled = true;
            const total = allImageData.length;

            // 設定正確的 overlay 標題（避免殘留 syncFromCloud 的文字）
            const _syncTi = syncOverlay ? syncOverlay.querySelector('.sync-title') : null;
            const _syncIc = syncOverlay ? syncOverlay.querySelector('.sync-icon') : null;
            if (_syncTi) _syncTi.textContent = '☁️ 同步至雲端...';
            if (_syncIc) _syncIc.textContent = '☁️';

            showSyncProgress(0, total, '準備上傳...');

            try {
                // ── Step 1：先刪除雲端所有舊圖片文件（避免重複）──────────────
                showSyncProgress(0, total, '🗑️ 清除舊同步紀錄...');
                const existingSnap = await fb.getDocs(
                    fb.collection(fb.db, `users/${currentUser.uid}/images`)
                );
                if (!existingSnap.empty) {
                    await Promise.all(existingSnap.docs.map(d => fb.deleteDoc(d.ref)));
                }
                // ────────────────────────────────────────────────────────────

                // ── Step 2：重新上傳所有本機圖片 ────────────────────────────
                const syncPrefix = Date.now(); // 本次同步的唯一前綴
                for (let i = 0; i < total; i++) {
                    if (!currentUser) {
                        hideSyncProgress();
                        showBanner('⚠️ 登入逾時，同步中斷', true);
                        break;
                    }

                    const data = allImageData[i];
                    const docId = `img_${syncPrefix}_${i}`;
                    const label = data.title || `圖片 ${i + 1}`;

                    showSyncProgress(i, total, `上傳中：${label}`);

                    // 若已是 Storage HTTPS URL → 直接複用，不重複上傳到 Storage
                    let url = data.src;
                    if (data.src.startsWith('data:')) {
                        const blob = await (await fetch(data.src)).blob();
                        const sRef = fb.storageRef(fb.storage,
                            `users/${currentUser.uid}/images/${docId}`);
                        await fb.uploadBytes(sRef, blob);
                        url = await fb.getDownloadURL(sRef);

                        // 更新記憶體中的 src，避免下次還被認為是 Base64
                        allImageData[i] = { ...data, src: url };
                    }

                    // 寫入 Firestore
                    await fb.setDoc(
                        fb.doc(fb.collection(fb.db, `users/${currentUser.uid}/images`), docId),
                        { url, title: data.title, date: data.date, tag: data.tag, camera: data.camera || '', order: i }
                    );

                    showSyncProgress(i + 1, total, `✅ 已完成：${label}`);
                }
                // ────────────────────────────────────────────────────────────

                // 同步完成後更新 localStorage（避免下次還帶 Base64）
                localStorage.setItem(LS_KEY_IMAGES, JSON.stringify(allImageData));

                // 完成
                showSyncProgress(total, total, '✅ 全部同步完成！');
                setTimeout(hideSyncProgress, 1200);
                showBanner(`☁️ ${total} 張圖片已同步到雲端！`, false);
            } catch (e) {
                hideSyncProgress();
                const msg = e.code === 'storage/unauthorized'
                    ? '❌ 權限不足，請重新登入後再同步'
                    : '同步失敗：' + e.message;
                showBanner(msg, true);
            } finally {
                isSyncing = false;
                cloudSyncBtn.disabled = false;
            }
        });


        // 從雲端載入
        async function loadFromCloud() {
            const fb = window._fb;
            if (!fb || !currentUser) return;

            // 顯示載入進度 overlay
            const syncOv = document.getElementById('sync-overlay');
            const syncFl = document.getElementById('sync-fill');
            const syncCt = document.getElementById('sync-count');
            const syncSt = document.getElementById('sync-status');
            const syncTi = syncOv ? syncOv.querySelector('.sync-title') : null;
            if (syncTi) syncTi.textContent = '📲 從雲端還原...';
            if (syncOv) syncOv.querySelector('.sync-icon').textContent = '📲';
            if (syncFl) syncFl.style.width = '0%';
            if (syncCt) syncCt.textContent = '查詢中...';
            if (syncSt) syncSt.textContent = '正在讀取雲端資料...';
            if (syncOv) syncOv.classList.add('show');

            try {
                const snap = await fb.getDocs(
                    fb.query(fb.collection(fb.db, `users/${currentUser.uid}/images`),
                        fb.orderBy('order')));

                if (syncOv) syncOv.classList.remove('show');

                if (snap.empty) {
                    showBanner('☁️ 雲端上尚無圖片，請先同步上傳', false);
                    return;
                }

                allImageData = snap.docs.map(d => ({
                    src: d.data().url,
                    title: d.data().title || '',
                    date: d.data().date || '',
                    tag: d.data().tag || '',
                    camera: d.data().camera || '',
                }));
                activeTag = '全部';
                filteredData = [...allImageData];
                buildTagBar();
                buildGallery();
                saveToLocalStorage();

                // BD: 從雲端還原利敏度 / 光源 / 送入 layoutCfg
                const profileSnap = await fb.getDoc(fb.doc(fb.db, `users/${currentUser.uid}/profile/info`));
                if (profileSnap.exists()) {
                    const lay = profileSnap.data().layout || {};
                    if (lay.dragSens !== undefined) { layoutCfg.dragSens = lay.dragSens; if (lvDrag) { lvDrag.value = lay.dragSens; lvDragVal.textContent = (+lay.dragSens).toFixed(1) + 'x'; } }
                    if (lay.touchSens !== undefined) { layoutCfg.touchSens = lay.touchSens; if (lvTouch) { lvTouch.value = lay.touchSens; lvTouchVal.textContent = (+lay.touchSens).toFixed(1) + 'x'; } }
                    if (lay.keySens !== undefined) { layoutCfg.keySens = lay.keySens; if (lvKey) { lvKey.value = lay.keySens; lvKeyVal.textContent = lay.keySens + '排'; } }
                    if (lay.lightAngle !== undefined) { layoutCfg.lightAngle = lay.lightAngle; const lvL = document.getElementById('lv-light'); const lvLV = document.getElementById('lv-light-val'); if (lvL) { lvL.value = lay.lightAngle; lvLV.textContent = lay.lightAngle + '°'; } applyTransform(); }
                }

                showBanner(`📲 雲端已還原 ${allImageData.length} 張圖片！`, false);
            } catch (e) {
                if (syncOv) syncOv.classList.remove('show');
                console.warn('載入雲端失敗', e);
                showBanner('❌ 雲端載入失敗：' + e.message, true);
            }
        }

        // ================================================================
        //  功能A：滑鼠跟隨視差效果
        // ================================================================
        document.addEventListener('mousemove', (e) => {
            if (isDragging || lbOpen) return;
            const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
            const tx = ((e.clientY - cy) / cy) * -6;
            const ty = ((e.clientX - cx) / cx) * 6;
            parallaxX += (tx - parallaxX) * 0.1;
            parallaxY += (ty - parallaxY) * 0.1;
            applyTransform();
        });
        document.addEventListener('mouseleave', () => { parallaxX = 0; parallaxY = 0; applyTransform(); });

        // ================================================================
        //  功能B：粒子背景特效
        // ================================================================
        const particleCanvas = document.getElementById('particle-canvas');
        const pCtx = particleCanvas.getContext('2d');
        const PARTICLE_COUNT = 80;
        let particles = [];

        const THEME_RGB = {
            cosmos: '99,102,241', sunset: '249,115,22',
            forest: '34,197,94', rose: '236,72,153', gold: '234,179,8'
        };
        function getParticleRGB() {
            return THEME_RGB[document.body.getAttribute('data-theme')] || '99,102,241';
        }
        function initParticles() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
            particles = Array.from({ length: PARTICLE_COUNT }, () => ({
                x: Math.random() * particleCanvas.width,
                y: Math.random() * particleCanvas.height,
                vx: (Math.random() - 0.5) * 0.35,
                vy: (Math.random() - 0.5) * 0.35,
                size: Math.random() * 2 + 0.5,
                baseOpacity: Math.random() * 0.5 + 0.1,
                phase: Math.random() * Math.PI * 2,
            }));
        }
        function animateParticles(ts) {
            pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            const rgb = getParticleRGB();
            const t = ts * 0.001;
            particles.forEach(p => {
                const alpha = p.baseOpacity * (0.5 + 0.5 * Math.sin(t * 0.8 + p.phase));
                pCtx.beginPath();
                pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                pCtx.fillStyle = `rgba(${rgb},${alpha.toFixed(2)})`;
                pCtx.fill();
                p.x += p.vx; p.y += p.vy;
                if (p.x < -5) p.x = particleCanvas.width + 5;
                if (p.x > particleCanvas.width + 5) p.x = -5;
                if (p.y < -5) p.y = particleCanvas.height + 5;
                if (p.y > particleCanvas.height + 5) p.y = -5;
            });
            requestAnimationFrame(animateParticles);
        }
        initParticles();
        requestAnimationFrame(animateParticles);

        // ================================================================
        //  功能C：縮圖帶
        // ================================================================
        // BB: 虛擬縮圖帶（只渲染可視視窗±8張，大量圖片時不卡頓）
        let thumbStripVisible = false;
        const THUMB_W = 54; // 縮圖寬 + gap
        const THUMB_EXTRA = 8; // 左右實際多渲染數
        let thumbVirtualTotal = 0;

        function buildThumbStrip() {
            thumbVirtualTotal = filteredData.length;
            thumbStrip.innerHTML = '';
            // 設定捲軸容器寬度
            thumbStrip.style.width = (thumbVirtualTotal * THUMB_W) + 'px';
            thumbStrip.style.position = 'relative';
            renderThumbRange();

            // BA: 圖片 ≥ 10 張才顯示跳至輸入框
            if (lvJumpRow) lvJumpRow.style.display = thumbVirtualTotal >= 10 ? '' : 'none';
        }

        function renderThumbRange() {
            const scrollLeft = thumbStrip.parentElement ? thumbStrip.parentElement.scrollLeft : 0;
            const visibleW = thumbStrip.parentElement ? thumbStrip.parentElement.offsetWidth : 300;
            const startIdx = Math.max(0, Math.floor(scrollLeft / THUMB_W) - THUMB_EXTRA);
            const endIdx = Math.min(thumbVirtualTotal, Math.ceil((scrollLeft + visibleW) / THUMB_W) + THUMB_EXTRA);

            // 移除超出範圍的結点
            thumbStrip.querySelectorAll('.thumb-item[data-idx]').forEach(el => {
                const i = parseInt(el.dataset.idx);
                if (i < startIdx || i >= endIdx) el.remove();
            });

            // 添加新進入範圍的結点
            for (let i = startIdx; i < endIdx; i++) {
                if (thumbStrip.querySelector(`.thumb-item[data-idx="${i}"]`)) continue;
                const data = filteredData[i];
                const el = document.createElement('div');
                el.className = 'thumb-item';
                el.dataset.idx = i;
                el.style.cssText = `position:absolute;left:${i * THUMB_W}px;top:0;width:${THUMB_W - 4}px;`;
                const img = document.createElement('img');
                img.src = data.src; img.alt = '';
                img.onerror = () => { img.src = `https://picsum.photos/seed/${i}/100/120`; };
                const num = document.createElement('div');
                num.className = 'thumb-num'; num.textContent = i + 1;
                el.appendChild(img); el.appendChild(num);
                el.addEventListener('click', () => {
                    currentRotationY = -((i % perRowGlobal) * theta);
                    carousel.style.transition = 'transform 0.6s cubic-bezier(.2,.8,.2,1)';
                    applyTransform();
                    updateThumbActive(i);
                    setTimeout(() => { carousel.style.transition = ''; }, 650);
                });
                thumbStrip.appendChild(el);
            }
        }

        // 容器滾動時重新渲染虛擬範圍
        if (thumbStrip.parentElement) {
            thumbStrip.parentElement.addEventListener('scroll', renderThumbRange, { passive: true });
        }

        function updateThumbActive(idx) {
            thumbStrip.querySelectorAll('.thumb-item').forEach((el, i) => {
                el.classList.toggle('active', i === idx);
            });
        }

        thumbToggleBtn.addEventListener('click', () => {
            thumbStripVisible = !thumbStripVisible;
            thumbStrip.classList.toggle('visible', thumbStripVisible);
            thumbToggleBtn.textContent = thumbStripVisible ? '🎞️ 隱藏縮圖' : '🎞️ 縮圖';
        });

        // ================================================================
        //  拖曳 & 觸控事件
        // ================================================================
        document.addEventListener('mousedown', handleDragStart);
        document.addEventListener('mousemove', handleDragMove);
        document.addEventListener('mouseup', handleDragEnd);
        document.addEventListener('touchstart', handleDragStart, { passive: true });
        // 🔧 LINE WebView 修復：統一改為 passive:false，確保 handleDragMove 內的
        // e.preventDefault() 有效，避免同元素混用 passive/non-passive 導致 WebView 崩潰
        document.addEventListener('touchmove', handleDragMove, { passive: false });
        document.addEventListener('touchend', handleDragEnd);
        window.addEventListener('resize', () => { initParticles(); buildGallery(); });

        // ================================================================
        //  初始化
        // ================================================================
        const _isReadonlyMode = !!(new URLSearchParams(location.search).get('view'));

        if (_isReadonlyMode) {
            // 分享瀏覽模式：不載入本地資料，顯示「載入中」佔位，等 initReadonlyMode 完成
            allImageData = [];
            filteredData = [];
            buildTagBar();
            // 顯示載入中提示卡，讓使用者知道正在讀取
            carousel.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:260px;gap:16px;color:rgba(255,255,255,.5);font-size:.95rem;"><div style="font-size:2rem;">🌐</div><div>載入相簿中…</div></div>';
            startAutoRotate();
        } else {
            const restored = loadFromLocalStorage();
            if (!restored) allImageData = [...DEFAULT_IMAGE_DATA];
            filteredData = [...allImageData];
            buildTagBar();
            buildGallery();
            startAutoRotate();
            if (restored) showBanner(`📂 已還原 ${allImageData.length} 張圖片`, false);
        }

        // Firebase 初始化（帶延遲等待模組）
        initFirebase();

        // ── 控制面板自動淡出（5秒後淡至半透明，hover 恢復）────────────────
        const _panel = document.querySelector('.control-panel');
        const _panelHandle = document.getElementById('panel-handle');

        // 手機版折疊抽屜：點擊把手切換展開/折疊
        function isMobile() { return window.innerWidth <= 768; }

        // 手機版預設展開，讓第一次進入的使用者看到功能列
        if (isMobile() && _panel) {
            _panel.classList.add('panel-expanded');
        }

        if (_panelHandle) {
            _panelHandle.addEventListener('click', () => {
                if (!isMobile()) return;
                _panel.classList.toggle('panel-expanded');
            });
        }

        // 損曳畫廊時自動折疊面板（於手機版）
        ['mousedown', 'touchstart'].forEach(ev => {
            document.addEventListener(ev, (e) => {
                if (!isMobile()) return;
                // 如果點擊目標是控制面板內部，不折疊
                if (_panel && _panel.contains(e.target)) return;
                if (_panel) _panel.classList.remove('panel-expanded');
            }, { passive: true });
        });
        let _panelTimer = null;

        function panelStartTimer() {
            clearTimeout(_panelTimer);
            _panelTimer = setTimeout(() => {
                _panel.classList.add('panel-dim');
            }, 5000);
        }

        function panelWake() {
            _panel.classList.remove('panel-dim');
            panelStartTimer();
        }

        // 滑鼠進入面板時恢復
        _panel.addEventListener('mouseenter', () => {
            _panel.classList.remove('panel-dim');
            clearTimeout(_panelTimer);
        });

        // 滑鼠離開面板後重新開始計時
        _panel.addEventListener('mouseleave', panelStartTimer);

        // 任何滑鼠移動都重置計時（讓整體互動時不淡出）
        document.addEventListener('mousemove', panelWake, { passive: true });

        // 觸控裝置：觸碰時恢復
        document.addEventListener('touchstart', panelWake, { passive: true });

        // 頁面載入後開始第一次計時
        panelStartTimer();
        // ──────────────────────────────────────────────────────────────────

    </script>

    <!-- 功能AE：批次上傳進度條 -->
    <div id="upload-progress-bar">
        <div id="upload-progress-header">
            <span id="upload-progress-label">準備中…</span>
            <span id="upload-progress-count"></span>
        </div>
        <div id="upload-progress-track">
            <div id="upload-progress-fill"></div>
        </div>
    </div>

</body>

</html>
